body:
  text: 紀效新書卷十六明戚繼光撰旌旗金皷圖說篇第十六名將所先旗皷而已近見東南人不知兵旗無法制率如兒戲或輕難視遠或重難執馳方色混雜不可辨認而臨陣分合更與旗無干聽兵用手逼唇為哨聲却以旌旗為擺隊之具金皷為飲宴之文至有大將名胄而亦烏合縱横一聽兵士紛沓一隊數色一陣數令以勝負付之自然以進退付之無可奈何吁可勝嘆哉予故不得已而繪此煩文以取譏罪諒之諒之右清道二旗軍行持衆之前以清途路排營則遇掌號笛執在馬路引官哨隊回營旗桿長八尺仍領送官哨隊回營旗桿長八尺用木葫蘆或葫蘆上加以鎗頭亦可方四尺藍色邊用紅色此用以引金皷桿高一丈二尺纓頭雉尾珠絡旗素黄色方七尺黑布字大二尺此與前大五方旗同用各照方色彩畫邊用生旗之色不可與本旗色相犯除邊方五尺桿高一丈五尺纓頭珠絡此用在將臺上行則隨主將以為外表五方之應外表視此為進止立伏桿高一丈五尺邊與旗幅同色用夾絹二幅長四尺闊三尺帶用五色自下相生而上長旗身有半旗頭用雉尾纓絡此乃出征之旗代轉光旗之用也桿用長鎗桿旗照字色邊同本旗之色庶純而可遠瞭方五尺不用彩畫黑旗上用白絹為字餘皆黑字旗頭用鎗頭以便出征輕潔色純不混衆目此該二副共十面晝則示奇兵及子營中軍親兵夜則看燈籠以代五方之用桿用好堅竹去皮紅漆長一丈六尺頭用小鎗頭金木胡蘆頂鐵梁務在輕便照方色全幅絹長一丈二尺燈用照方色薄油紙此不可用於行陣重大也桿高一丈六尺旗大一丈黑綠緞為之白綾為邊纓頭飾以珠絡極其華麗此帶四方各門方色並中央黄素帶倶憑坐纛上以為四方之生但可操而不可用於臨陣以其大而重也桿無燈坐纛上用鐵十字架以懸之此主將號旗顏色隨意不預設以泄機桿用長鎗旗方一丈二尺此後二十八宿形旗凡出軍立方向八門使兵由之而出則用又凡遇出兵之日所輪勝宿即以此旗領軍桿長一丈六尺頂用纓絡雉尾邊幅之色俱同各照方色方可六尺二十八宿眞形旗各一面此後六丁六甲旗十二面用法與二十八宿旗同旗色照方向邊同大旗之色桿長一丈三尺旗方五尺頂用纓頭雉尾珠絡角旗八面髙大俱同五方旗用木紅葫蘆頭或雲鎗頭行則夾五方神旗但矮於五方一尺其色則東南上半幅藍下半幅紅南東反是東北上半幅藍下半幅黑北東反是西北上半幅白下半幅黑北西反是西南上半幅白下半幅紅南西反是花焰邊隨本旗之色上下各一半八卦正旗髙大式桿俱照五方真形旗上用金木葫蘆頭各以八卦方向為色四正方者色純四竒方者照角旗各得一半上畫本方之卦於旗之中央紀效新書卷十六
