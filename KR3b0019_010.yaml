body:
  text: 紀效新書卷十明戚繼光撰長兵短用説篇第十器械不利以卒豫敵手無摶殺之方徒驅之以刑是魚肉乎吾士也器習利而無號令金鼓以一其心雖有藝與徒手同也三軍既熟悉吾令則當精乎藝藝與法令當並行而不悖者故以長短兵説為第十夫長器必短用何則長鎗架手易老若不知短用之法一發不中或中不在喫緊處被他短兵一入收退不及便為長所誤即與赤手同矣須是兼身步齊進其單手一鎗此謂之孤注此楊家鎗之弊也學者為所誤甚多其短用法須手步俱要合一一發不中緩則用步法退出急則用手法縮出鎗捍彼器不得交在我鎗身內彼自不敢輕進我手中鎗就退至一尺餘尚可戳人與短兵功用同矣此用長以短之祕也至若弓箭火器皆長兵也力可至百步者五十步而後發力可至五十步者二十五步而後發此亦長兵短用之法也長則謂之勢險短則謂之節短萬殊一理長鎗總説夫長鎗之法始於楊氏謂之曰梨花天下咸尚之其妙在於熟之而已熟則心能忘手手能忘鎗圓神而不滯又莫貴於靜也靜則心不妄動而處之裕如變幻莫測神化無窮後世鮮有得其奧者蓋有之矣或祕焉而不傳傳之而失其真是以行於世者卒皆沙家馬家之法蓋沙家竿子馬家長鎗各有其妙而有長短之異其用惟楊家之法有虛實有奇正有虛虛實實有奇奇正正其進鋭其退速其勢險其節短不動如山動如雷震故曰二十年梨花鎗天下無敵手信其然乎施之於行陳則又有不同者何也法欲簡立欲疏非簡無以解亂分糾非疏無以騰挪進退左右必佐以短兵長短相衛使彼我有相倚之勢得以舒其氣展其能而不至於奔潰兵法曰氣盈則戰氣奪則避是已今將六合之法並二十四勢繪録於後以廣其所傳云八母鎗起手你劄我我拏鎗你劄我我攔鎗你劄我腳我顚鎗你上劄我捉鎗你下劄我櫓鎗你上劄我捉鎗你下劄我顚鎗你鎗起我纏攔下你劄我我拏鎗一合先有圈鎗為母後有封閉捉拏梨花擺頭救護要分明裏把門外把門閃賺是花鎗名曰秦王磨旗我劄你你拏鎗還鎗我拏鎗我劄你你攔下還鎗我攔鎗你儘頭鎗我顚鎗還鎗你拏鎗還鎗我拏鎗你劄我我拏鎗閃賺花鎗上你拏鎗還鎗我拏鎗你劄我我攔下閃賺花鎗上你攔下還鎗我攔鎗你劄我儘頭鎗我顚鎗閃賺花鎗上你拏鎗還鎗我拏鎗我搖花鎗乃秦王磨旗二合先有纏鎗後有攔鎗黃龍占杵黑龍入洞拏鎗救護閃賺花鎗上名曰鳳點頭我纏你鎗你劄我我攔下還鎗你攔下還鎗我攔鎗你劄我我拏下你起鎗我隨鎗纏拏下你攔鎗我還鎗你拏下還鎗我掤退救護拏你鎗你劄我我攔下我搖花鎗乃鳳點頭三合先有穿指後有穿袖鷂子撲鵪鶉救護閃賺是花鎗四面是鎗法名曰白蛇弄風你劄我我拏下閃賺花鎗上你拏鎗還鎗我拏鎗你劄我我攔下閃賺花鎗上你攔下還鎗我攔鎗我搖花鎗乃白蛇弄風四合先有白拏鎗掤退鎗救護後有白攔進步如貓捉鼠救護閃賺是花鎗名曰鐵掃帚我白拏進步上劄你你拏鎗還鎗我掤退救護拏鎗我白攔進步上劄你你攔鎗還鎗我攔鎗我白顚進步閃賺花鎗上劄你你拏鎗還鎗我拏鎗我搖花鎗乃鐵掃帚五合先有四封四閉後有死中反活無中生有迎封接閃賺是花鎗名曰撥草尋蛇你劄我我拏鎗進步劄你你拏鎗還鎗我拏鎗你劄我我攔鎗進步劄你你攔鎗還鎗我攔鎗你拏下我鎗你鎗起我反拏你鎗你攔下我鎗你鎗起反攔下你鎗你拏我鎗我鎗閃過攔你鎗你攔我鎗我鎗閃過拏你鎗你劄儘頭鎗我顚開捉住你反起劄我我攔下閃賺花鎗上你攔鎗還鎗我攔鎗我搖花鎗乃撥草尋蛇六合一截二進三攔四纏五拏六直閃賺是花鎗下遊場撥草尋蛇上遊場秦王磨旗一接二進三拏四纏五攔六直大遊場秦王磨旗鐵掃子必無路裙攔鎗伏虎鎗地蛇破地蛇鎗儘頭鎗破中平鎗中平鎗破中平鎗鎗中王高低遠近都不妨高不攔低不拏當中一點紀效新書卷十
