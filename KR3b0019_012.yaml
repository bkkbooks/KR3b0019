body:
  text: 紀效新書卷十二明戚繼光撰短兵長用説第十二夫釵鈀棍鎗偃月刀鈎䥥皆短兵也何則彼之鎗一丈七八尺我之器不過七八尺若如浙江釵鈀之法俱手握在頭下其手外頭柄通不及二尺長一棍不過六七尺又欲兩頭雙使而兩手握開所剩棍頭不過尺餘彼之長鎗閃閃而進疾如流星我就精熟只能格得彼鎗不中入我身耳及其我欲進則彼原進我釵内不深一縮又復在外我不得撥定彼鎗使無反手如何敢進如此終日我無勝理短兵利在速進終難接長持久即為所乘必如總戎公俞虛江之法則所執釵棍鈎鈀皆有六七尺在外彼若以長入我必須進深五尺被我一格打歪即用棍内連打之法下下著在長兵上流水㸃戳而進彼先進我五尺我一進又有五尺是得一丈之勢矣被我連打勢不得起欲抽脱去豈能便抽一丈一入長兵之内則惟我短兵縱横長兵如赤手同矣藤牌腰刀本短中之短也而必用標鎗亦即短兵長用之法也夫藤牌用標非取以殺人蓋彼以鎗器持定我牌無故不得進故用標一擲彼以顧標而動我則乘勢而入彼若不為標所動則必為標所傷我亦有隙可入短兵長用之法千古竒秘匪欺人也一用棍如讀四書鈎刀鎗鈀如各習一經四書既明六經之理亦明矣若能棍則各利器之法從此得矣一總訣歌以下錄校總戎俞公劍經中直八剛十二柔上剃下滚分左右打殺髙低左右接手動足進參互就一總訣歌剛在他力前柔乘他力後彼忙我静待知拍任君鬬一總訣歌隂陽要轉兩手要直前脚要曲後脚要直一把一掲遍身著力步步進前天下無敵一習鈀簡步十進足如環無端進一足中平當大壓又進一足壓死又進一足小壓又進一足壓死又進一足髙大當又進一足大壓死又進一足髙小當又進一足小壓死又進一足髙大當又進一足大壓死一鈀習步法中平起大斜壓他大飛天我轉角趕上壓他再大飛髙我小髙直當即小壓下他小飛髙我小髙直當即小壓下他再小飛髙我大髙直當即大壓下過小他抽直殺來我再大壓過小他入我大上角我用身力轉角趕上畧收低他再入我大上角我轉角對手直殺去跳回一步他打來我伏回即趕上大起一掃下再跳回中攔止大壓小壓已粘他桿即大進上鏩死他小直當小斜壓大直當大斜壓一總訣歌視不能如能生疎缺後手須有功遍身缺動時把得固一發未深入打剪急進鑿後發勝先實步步俱要進時時俱取直更有隂陽訣請君要熟識一習步法起中平推牽扁身殺丁字回殺旋手進五步殺跳退三步原位直打直挑進五步殺腰刀挑打滴水獻花殺跳退三步原位進打穿後手馬前雞啄進三步殺馬前斬草進三步殺跳退原位打沉讓他先起穿後手抽回弔前抽回三脚並進五步殺進大門趂棍走小門趂棍走進直符殺洗倒頭直打直起磕打殺擺腰進三步剪殺跳退原位一總步目直破打剃大剪小剪掲用手力上扁身滴水獻花弔剪下起接讓髙低俱有大起棍從小門去打他手不論中不中須急退丁字回他决進我小門來傷我此時我一掲一進斜剃落打他手决中矣一侵他二尺低打低掲連㡬下待他忙時急退丁字一步急大進步弔剪他手急收回原勢立他進來打我我就大門下起接他一大剪急變扁身中攔殺一兩人小門對打對掲須急變急變時勿使他掲著掲著則不及矣大門下起接大剪我順勢打中攔殺或於掲時即用小剪變大剪中攔殺一兩人大門對打不進前脚不折後脚不能勝須有順勢折脚知是逃閃之法一兩人大門齊對打我且將棍提在髙連脚抽回些些遲斯須進步壓打下即進變扁身中攔若我打去他棍提回讓我我須勿將棍尾打下只進步對他胷喉直殺去一我從大門順用單鞭壓深入他用力來抵若迫近大剪我離了子午若迫近我急抽就下面過小門掛他手上一殺他用小剪我一掲一殺或急抽過大門剪殺或又過小門倒牽若未迫近即打下小門作敗狀一我從大門順入他用力來抵大剪我離了子午我大進步就小門急起滴水去捧他如前第三問者一我起流水漸進他决來打我手我將脚坐下直對他手一捧或殺皆可又他來打我手我從小門一掲接或大門一起接要在我右手前七八寸之間與他棍尾相磕一響為度二門起俱繼以剪急變扁身中攔殺一兩人大門對打棍尾在地下讓他先起穿他小門手上須兩手捧髙使他打不下一兩人大門對打我讓他先起就掲他小門用小剪變大剪即鐵門鋑殺若他小門來壓我急就下面過大門剪殺一兩人大門對打他弱我用强他强我弱讓兩在髙讓他先打下我便進壓兩在低讓他先提起我便進接連打殺李欽師父每每用此二步一喜鵲過枝有四他直髙打來我將棍抽過大門讓他下隨用大剪一也他直髙打來我將棍抽過小門讓他下對胷殺去二也他直平打來坐脚過枝進步小門殺他三也平直殺或打來我打後脚即順勢大門剪殺四也以上過枝俱在下面過入他棍二尺一治伏棍低棍須用小剪離他手前一尺之間他急過大門我或掲進打亦可飛風箭亦可急變大剪殺亦可又我小剪他他抽走我急進步起髙棍打須在他手上小門一他打來臨身在小門則趂棍走一打在大門則走馬回頭丁字步一打順棍上一殺又一大剪扁身中攔殺一大門接兇棍有五扁身中攔接一也髙捧接二也下起磕三也我棍畧横離前手一尺受他打一下四也待他打將到身用手前一尺磕他一下五也各接後須急用大剪繼之以殺一他雞啄我須起兇棍入剪他手前二尺之間他連起我連剪我雞啄他起兇棍我讓他先起穿他小門手上我接先棍步亦可一他直殺來須進脚向小門剪或向他棍尾小門起變大剪或端的直破閃腰剪凡剪後須至進殺都不如定四步坐直趕上一凡小門一掲一打一打又一掲終無結尾必須乘掲用小剪如鐵門鋑過大門結尾或將身抽退他打來我就大門下起接剪他殺結尾一凡起手要打要殺俱要在他門内一尺之間未可將手勢發盡待他趕來傷我他手勢已盡此時或大或小或剪或掲或自大下起接各將他棍死了然後進步扁身中攔結尾無不勝也法曰後人發先人至知此决不可一發便要傷人徒使自勢發將盡為他人反傷戒之戒之一棍初交則下起者有勢棍深入則上壓者取贏一我單鞭壓他變馬前斬草我且大進一步硬用手刀他棍自輸一小剪是棍中至要人所不疑者一凡棍動時須要把得極堅固方有力一凡大小門直破打不分粘他棍不粘他棍務對他手直起直落任他掲打或我掲打他我棍亦不離他身五寸即離亦須即直一凡日間將棍一打一掲自習打掲俱要有聲久則自有力髙不過目低不過膝一凡小門殺須在他手上方無後患大門亦然一三脚時打須要習有大僻又定四打要習一彼抽退勿急追彼急進勿遽離一腰刀為上後手力次之前手力又次之一棍提起手陽殺去及打去俱手隂隂陽最要識一凡小門殺來待來將到手丁字回一掲折進殺則中矣一下哄待他剪向上直符送書殺上大門哄或打他手折脚伏下小門殺或伏下待他來一掲殺更妙一我將棍畧髙畧侵入他來接我即丁字步滚下殺一他起髙攔打我折進大門將他棍尾或半棍敲下進齊眉殺須知有順勢敲時切不可泥自棍一凡進殺須急丁字回頭退方穩一大門髙哄殺去四五尺他來抵壓我回頭牽進殺小門亦然一梗直大門哄殺去四五尺待他來抵剪就剪他大進殺小門亦然須知有順勢丁字回頭亦可一侵他三四尺低打低掲連㡬下待他忙時大進趂棍進殺一梗直哄殺去四五尺任他打或掲我就㝷他虛處大進殺去一凡他棍來我避他抽退我急隨殺極妙不急不可去一我大門髙進入丁字牽伏下他趕來我一牽掲進鑿一我打棍後繼以殺殺後大門即當採洗洗而後殺小門須小牽一兩棍相交他抽回伏地開小門我直捧慢慢指去待他發殺然後掲牽或剪進殺他一他直殺來我直殺去我將脚折過分分將手反隂陽蓋殺去莫非後發先至之意一他將棍打下丁字回頭伏我就移脚去就他棍尾連打連掲使他忙直進殺一凡兇棍打來我順勢敲一下就扁身中攔兼大僻連連疊革進去破雞啄亦是如此一兩人大門對打連㡬下待他忙時急抽回讓弔大進步打一大門起髙棍打移步盤山托一拏定直符送書大小門托避他打一直陽手殺去隂手打壓下大門殺臨手待他剪過小殺缺一坐低閉四門一將棍滚他一下侵他自然提起須再一敲將他棍死盡然後殺須記得疊疊敲他初教滚手直入缺次教大粗打掲亦要直後教輕牽順勢待他臨身二三寸之地全用折脚又用閃退法又有跳退法前足先起或齊起要知採與牽不同要在哄使虛乘之一破直殺有七一步閃要打二步打脚二步滚二步流水一我扁身入深此時不顧性命了只兩目認他胸前棍上空急穿上棍下空急穿下一他大過枝小直符指去一步他小過枝大我亦直符指去一步一凡直符殺不礙他棍尾一我過枝小門用盤山托亦可用直符步亦可一大哄過小待他來小壓急過大剪殺蓋哄多則容易也剪而後殺則無後患也中有順勢須知之一凡進殺先軟後硬今後勿用打一破髙攔務先順牽後剪殺殺去待他落即轉要知順牽與剪不同一殺在小門待他來即過大門剪後殺如小門先牽後殺之理但須防他回頭牽他回牽我又過去小門又曰盤山托大折過小一直入打剪他臨手一殺待他剪前後過小門容易一對棍低入小門一小掲小剪殺或待變一他疊打掲我對打二步對手殺大進待他打下大剪或殺一我大入他過小門我就坐進前脚就他棍中滚入然後大打進殺一他滴水我對他手慢慢指去待他動即坐脚剪下進鑿一小門有掲亦有大掲與獻花不同一他坐低我正好折過小門打一凡將棍直指慢慢侵入待他動欲打我我就殺他他欲殺我我就進打他手一何嘗叫人勿打要哄他棍來就我打若打他棍著響一聲便可進殺一何嘗叫人勿殺要哄他棍開殺去勿使他打著方可殺深殺後在大門即洗小門即掲牽一但凡接髙棍須防他盤山托就坐下小剪一他大門單鞭坐脚直滚入殺我折進前脚過大門直符殺他一俯身掲順勢剃急接打未如俱要習熟一鈀對刀他入我四角我四下不相粘後手起髙殺自思出扁身中攔兼大僻丁字步要大僻他起髙我就趕上剃扁身中攔殺要後手髙平胸去一他打來我打去他起我掲務要小剃又要疊疊押去大亦然手動時即下定四步門户方密一他打來我打去他起我對手穿入小門隨將兩手捧髙手動時即落定四步寸寸打上隨他小門殺小門壓大門殺大門壓他起大髙趕上剃要就殺或先接後殺他起小髙趕上大接或掲小剃右此一步乃棍中之正兵不能離此以取勝者也不能勝亦不能敗一打時須記得進殺千萬千萬一大門迫他壓低我抽下過小門如殺狀他决盡力來小壓急急抽過大門剪殺此步極妙右此一步髙打來亦要如此哄急翻剪殺且鐵牛入石我掲起打下他方掲起我就抽他手邊過人剃打亦可一雙人大門對打他力雄我急變丁字步打用身壓之然後變一他小門殺來急我坐進前脚就他棍中滚入連剪二三下然後殺一把大門空起勾下勾步絶妙又有下流水勾不乂他一對手直起對他身打落如是走離大併直是為上好一他刀下來我或大門流水勾迫或小門流水俱不乂他刀如棍用須繼以對手大請起又起勢時就手大門流水去亦可一大門扇出他刀尾伏回待他來不拘他刀髙下俱對他身直起他不來若近或他刀不髙亦請得起若不出他刀尾就將刀壓下對面直起有閃身一小門陽手扇下隂手請起凡請起如不著即急對他身他刀扇下大小門皆然一他刀中攔直來我直就上壓下中攔有㧞步有順勢轉角步又有鈀過他身將他身勾來一我出中攔鈀他直打下我將鈀抽大門起上壓落如我用棍步須勿使他打著一凡他起我亦起他落我亦落俱要隨他一凡乂起他逆對須順他勢或左或右落凡下乂起亦然須知步步進脚一凡被他刀入角即便坐退後脚稱起一凡我伏回他只中攔立不來我就偷後脚進去深扇入有哄一他髙攔打下我就大門掲起不用隂陽手只直掲起則我在上而彼在下矣他若將棍如打下而不打下當我掲起則彼下則我輸矣總不外棍深入在上者取贏若我棍打沈了他打來我用别步皆不及只直硬起妙一把棍堅把住用身勢棍頭髙慢慢侵入他大門來我大門接一下只離一寸他小門來我小門接一下只離一寸待他何門死我盡身入一鐵牛入石我打去他掲起我將棍尾勿墜就將棍尾倒抹上一下即大剪他手或即打他手他打來我掲起即入殺他小門極妙極妙一凡接他大剪雞啄妙皆如此一直磕一聲就殺去不用㧞剃亦甚𦂳矣惜無困死人棍之法大抵用㧞剃為是一凡左右門打來俱用手前一尺改他棍尾凡左右門殺來俱用棍尾改他手前一尺蓋他打來勢重必須吾手前一尺方接掲得他住他殺來手輕又要過枝必須用吾棍尾改他手前一尺一學到上下髙低硬軟直破打上下接俱是一手法方是有得但直破順勢打是一套去接是做二節去初學未易語之後手初曲後直硬處須悟得前手􅀈須悟得一我單鞭上他過小門若深入即用直符送書殺若他入淺則不可恐他掲起只用趕上直打凡殺來大小門皆如此例一凡過小門殺來我就行過小門就他棍尾對手直打下若變過大門殺來我就行過大門就他棍尾對手直打下妙妙總有三節接髙攔一􅀈磕一㧞後手一尺剃一隻殺接低打來亦然一直破對打􅀈磕帶抽後手剃相連後進殺一入中攔只用一􅀈磕帶畧㧞剃五寸一進殺若未侵入他棍未死亦用㧞用手一尺剃下進殺一踏過他小門進入如前法但自棍横勢送進上中攔皆然此當字如曲中之拍位妙不可言故贊之曰我􅀈他旁前手直當後直加㧞有神在中學到此一貫乎萬矣千千萬萬步俱有拍位一轉隂陽不可太早臨時一下乃不費力明之明之折脚不如直入右李良欽之𫝊學到此一貫乎萬矣右劉邦協之傳中間有拍位不用㧞剃洗落只撒手殺則又𦂳矣但無困死人棍之法大抵前用㧞剃為是小門亦然右在偏頭闗時得之教師林琰者其詩曰壯士執金鎗只用九寸長日日打一轉好將見閻王三教師原來合一家一千言萬語不外乎致人而不致於人一句李良欽之所以救得急者都是前一下哄我去然後轉第二下來接救得速故能勝也一不外乎後人發先人至一句不外乎不打他先一下只是打他第二一下一俱是順人之勢借人之力只要快便又要似進實退而後進則大勝矣一俱要習上攔大小門剃下攔大小門剃下攔小門剃頗難須用功習之一兩人大門對打對拍忽然變大僻兇猛打下甚妙甚妙兩人對雞啄亦如此變一二龍争珠殺就採下不用提起棍此全是手法前後手俱有法正教師童琰父所謂尾相遇順滚至他手殺他身剃是他髙打來或髙殺來或他雖把定未動但棍尾髙有十字我用棍尾量一尺之處與他棍尾或棍中相遇剃下大小門皆有滚剃順至他手殺他身此滚剃之不同也下起磕彈何以不滚剃磕既響一聲恐他棍開或沈無隙可乘故不打剪然後殺一先侵二三尺一打坐身沈棍頭他必進殺我就下起磕一響大進步打剪或丁字回打剪然後扁身殺他喬教師曰彈鎗則在下面横捧亦起磕之法但在下面横則無不響之理矣童教師曰一聲響處直千金彼失隄防我便贏是也依喬教師之説乃知伏回之鎗俱是哄我殺去他即起彈殺我也記之記之一剪打急起磕起磕復急剪打剪打復急起臨時取之力也我􅀈他旁亦是臨時取之力須要誤他臨時取力口訣一但凡打敲採洗俱用後手功夫故棍不用提起髙今之欲用力打人者惟恐棍提起不髙打不重蓋只是有前手之力無後手之功故耳一伏回之鎗俱是哄我殺去他即起彈殺我也記之記之一全書總要只是乘他舊力畧過新力未發八字耳至妙至妙此又是我􅀈他旁之秘㫖語到此則不能復加一言矣一凡此意味體認得真亦有七日不食彈琴詠歌之趣也一滚剃後須早趕上當剪死他棍然後殺記之記之大小門皆然是他低平直殺來我棍在髙遂坐下量離了手前一尺與他棍磕相連而進彼從何處殺將來微乎神哉破金鎗第一法也穩而能勝習之習之一他打下我掲起我哄他欲打下而實不打下待他盡力掲起力使過了即趕他棍剃下問如何是順人之勢借人之力曰明破此則得其至妙至妙之訣矣蓋須知他出力在何處我不於此處與他鬭力姑且忍之待他舊力畧過新力未發然後乘之所以順人之勢借人之力也上乘落下乘起俱有之難盡書鈎刀鎗棍千步萬步俱是乘人舊力畧過新力未發而急進壓殺焉我想出舊力畧過新力未發八箇字妙之至也妙之至也前言拍位都是此理一小門進對打須斟酌用之恐力大之人一挑打我走難離矣大抵小門只是哄他不真打他或殺為穩一與用左手人對在小門須坐極低在大門大折足過折一他用極長軟鎗或竹鎗我須坐身將棍頭提髙慢慢迫上待他下面殺來即變一攔粘定用黄龍轉尾步趕萬無一失一學至於此則身手足應心全不扞格矣學至於此全不看見他是鎗是刀只認定對他手前殺他身而已若他打來亂時必須忍畧退回坐足下中平待少頃他來即用磕手法進自勝總是以静待動以逸待勞道理微乎道理微乎李良欽每每如此一大門大侵入磕小門不可大侵入挑大門大侵入磕則彼必死無疑矣小門若大侵入挑恐彼力大挑不起則難救矣若挑起一響然後大侵入打他又俱妙一他棍起就進步直當去不待他打落低攔亦然一大剪下起手要直平不曲一但凡先一下打他棍他自然提起再趕上直當大僻中要有順勢一剃後待他起進步直當一齊打下讓他起趕上直當如鈀步一小門更勿直鑿只哄他棍起就過大門直當剃打一兩人對雞啄大進步趕入對棍尾剃乂起進殺待他起直當去一打忙時須要認空處殺一對手鑚去須他棍上一打到中間忙時須記得收下再起一我打他接我須不與他接著只是埋下引他打下我起接則我為後發先至一我打不與接著即轉小門挑起進打亦是後發先至之理一把到中間他打下我接起我勿打下他决再起即急再直當去則他自敗也一我入被他打覺敗即急跳退記之記之一師父初假意殺來或打來我或接著或挑著决不宜貪心就進去傷他待他動我再或接或挑進去傷他一打認棍打􅀈認棍􅀈剃認棍剃入認棍入挑認棍挑凡舉手俱要認他棍若認人不認棍之説是彼棍已敗開了只管認人坐去也㝷鎗頭就死求贏一將棍頭低穿入他棍下或左邊一起一剃或右邊一起一剃起要有響為度總是一理一􅀈是脚去手去剃是脚去手回順是脚去手去剪是脚去手回小當小壓鈀法四者相連如環無端微乎鈀之用其止於是乎大當大壓一凡直當之後打下不如進脚頓坐下打下則自勢盡他反當我頓坐下則有有餘之勢如他再起則再當之大小門皆然一凡鈀遇軟殺人須照我原大扇趕為氣勢容易服人凡遇破進步起用入須不離分寸如今所製鈀譜入他為穩一大門輕打他棍下他用刀來抵即丁字步大進打彼自屈矣一大當大頓坐小當小􅀈坐他大壓我偷過小􅀈坐他小壓我偷過大頓坐千步萬步此段盡之一今以後打步少只是當死他棍前後鑿他一千言萬語總是哄他舊力過去新力未發而乘之一鈀所以終對不得鎗刀者鎗有哄鈀哄不得人也一響而後進進而後響分别明白可以語技矣一山東河南各處教師相傳楊家鎗法其中隂陽虚實之理與我相同其最妙是左右二門拿他鎗手法其不如是撒手殺去而脚步不進今用彼之拿法兼我之進步將鎗收短連脚趕上且勿殺他只管定他鎗則無敵於天下矣向見總戎俞公以棍示余其妙處已備載劍經内逐合註明無容再贅其最妙者只在一得手之後便一拿一戳如轉圓石於萬仭之山再無住歇彼雖習藝勝我幾倍一失勢便無再復之隙雖有師家一敗永不可返矣不惟棍法雖長鎗各色之器械俱當依此法也近以此法教長鎗收明效極妙極妙已上劍經止紀效新書卷十二
