  text: 紀效新書卷十八明戚繼光撰治水兵篇第十八一兵船束伍法每福船一隻捕盜一名舵工二名繚手二名扳招一名上斗一名椗手二名上用甲長五名每甲兵十名第一甲佛狼機甲長專管放佛狼機賊近管放火磚烟罐等器第二甲鳥銃甲長專管放鳥銃賊近攻打第三甲標鎗雜藝甲長賊遠照管船隻搖櫓賊近發鎗刀石藥等項第四甲標鎗雜藝甲長賊遠照管船隻搖櫓賊近發鎗刀石藥等項第五甲火弩甲長以一半打弩以一半放火箭賊近從便攻打以上如與賊逼近船邊一時遇巧不拘何人用何器但能奮勇當鋒用火藥火器成功用刀鎗戰殺有功各為首者倶以破格奇功論每甲長一名管兵十名甲長小旗一面照方色今以見在船分之福船二隻海滄船一隻艟􅬋船二隻為一哨立一哨官左右二哨官為一營立一領兵官以松門關分右後二營海門關分前左二營各以指揮一員統領其船上大旗則倶用黑布仍用白布做一大字在旗通寫作台字各照方色製以號帶甲長旗各照號帶方色每船五方旗一副前營紅旗紅邊一面藍旗紅邊一面白旗紅邊一面黑旗紅邊一面黄旗紅邊一面左營紅旗藍邊一面藍旗藍邊一面白旗藍邊一面黑旗藍邊一面黄旗藍邊一面右營紅旗白邊一面藍旗白邊一面白旗白邊一面黑旗白邊一面黄旗白邊一面後營紅旗黒邊一面藍旗黒邊一面白旗黑邊一面黑旗黒邊一面黄旗黑邊一面中軍紅旗黄邊一面藍旗黄邊一面白旗黄邊一面黒旗黄邊一面黄旗黄邊一面兵夫列船式平時在船四面擺五甲總合為一大哨於船四面各甲各器長短相間分方面外而立如遇打賊隨賊所在之面倂力動手無賊之面亦留每面二人防看其船頭用銃一架第一甲撥兵四名專管船頭閘板下第二甲撥兵四名專管兩水倉門以上如與賊逼近船邊一時遇巧不拘何人用何器但能奮勇當鋒用火藥火器成功用鎗刀戰殺有功者俱以破格奇功論每甲長一名管兵十名甲長小旗一面方色同大船兵夫列船式平時在船四面擺四甲總合為一大哨於船四面各甲各器長短相間分方面外而立如遇打賊隨賊所在之面倂力動手無賊之面亦畱每面二人防看其船頭用銃一架第一甲撥兵四名專管船頭閘板下第二甲撥兵四名專管兩水倉門艟􅬋一隻即大蒼山船也捕盜一名舵工一名椗手一名繚手一名甲長三名兵夫三十名旗幟方色俱隨本哨福船相同但尺寸不同另開於旗圖之中兵夫列船式平時在船四面擺三甲總合為一大哨於船四面各甲各器長短相間分方面外而立如遇打賊隨所在之面倂力動手無賊之面亦畱每面二人防看平居號令禁約福船應備器械數目大發貢一門大佛狼機六座碗口銃三箇噴筒六十箇鳥嘴銃十把烟罐一百箇弩箭五百枝藥弩十張粗火藥四百斤鳥銃火藥一百斤弩藥一瓶大小鉛彈三百斤火箭三百枝火磚一百塊火砲二十箇鈎鐮十把砍刀十把過船釘鎗二十根標鎗一百枝藤牌二十面寧波弓五張鐡箭三百枝灰罐一百箇大旗一面幷號帶大篷一扇小篷一扇大櫓二張舵二門椗四門大索六根小索四根每根長十八丈扳舵索一根繚後手索二根椗􅀈四根每根長二十丈絞椗索四根鐵鍋四口幷竈蓋花碗八十箇鐵鍬四把鐵鋸四把鐡鑽四把鐵鑿四把鐵斧四把薄刀二把銅鑼一面重五斤大更皷一面小皷四面大桅旗一頂正方旗五頂水桶四擔幷􅰐梁燈籠十盞木梆鐵鐸一副備用大小松杉木十株火繩六十根繩十根鐡蒺藜一千箇捕盜自備用釘四十斤油五十斤麻六十斤灰三擔各兵自備用篾盔一頂隨身釘鎗一根腰刀一把海滄船應備器械數目大佛狼機四座碗口銃三箇鳥嘴銃六把噴筒五十箇烟罐八十箇火砲十箇火磚五十塊火箭二百枝粗火藥二百斤鳥銃火藥六十斤藥弩六張弩箭一百枝弩藥一瓶大小鉛彈二百斤鈎鐮六把砍刀六把過船釘鎗十根標鎗八十枝藤牌十二面寧波弓二張鐵箭二百枝灰罐五十箇大旗一面幷號帶大篷一扇小篷一扇大櫓二根舵二門椗三門挽篙十根大索四根小索四根每根長十五丈繚後手索二根扳舵索一根椗􅀈四根每根長二十丈絞椗索四根鐵鍋二口幷竈蓋水桶二擔花碗五十箇鐵鍬二把鐵鋸二把鐵鑽二把鐵斧二把薄刀一把鐵鑿二把更皷一面小皷二面銅鑼一面重五斤五方旗五面燈籠四盞木梆鐵鐸一副備用大小松杉木五株火繩三十六根繩五根鐵蒺藜八百箇捕盜自備用釘三十斤油四十斤麻四十斤灰二擔各兵自備用篾盔一頂腰刀一把隨身釘鎗一根蒼山船應備器械數目大佛狼機二座碗口銃三箇鳥嘴銃四把噴筒四十箇烟罐六十箇火磚二十塊火箭一百枝粗火藥一百五十斤鳥銃火藥四十斤藥弩四張弩箭一百枝弩藥一瓶大小鉛彈一百六十斤鈎鐮四把砍刀四把過船釘鎗八根標鎗四十枝灰罐三十箇大旗一面幷號帶大篷一扇小篷一扇遮暘篷八扇大櫓一枝邊櫓八枝舵二門椗二門竹篙二十根大索四根小索二根每根長十五丈扳舵索一根每根長二十丈繚後手索二根椗􅀈二根每根長二十丈絞椗索一根篾纜一根鐵鍋二口幷竈蓋鐵鋸一把花碗四十箇鐵鑽一把鐵斧一把鐵鑿一把薄刀一把銅鑼一面更皷一面小皷一面五方旗五面燈籠四盞木梆鐵鐸一副火繩三十六根備用杉松木五株繩五根捕盜自備用釘三十斤油三十斤麻三十斤灰二擔各兵自備用篾盔一頂腰刀一把隨身釘鎗一根一平日各照𣲖定武藝時常檢㸃船上器具每日一次看驗損壞火藥遇天晴五日一曬收閣乾燥避火之處鎗刀鐵器半月一磨遮蔽風雨一件收磨不如法扣罰工食甲長連坐一每船斧口石大擂石務足若干八分放在船底二分放在船面用過即補不補者扣工食一每甲兵六名如有在逃一名將甲長綑打收監甲下兵夫以五名收監以五名齎文分投捉拿獲日即以本犯應得工食充賞限三月拿不回將差過之兵各打四十監禁又差在監一半去拿如此輪拿一年不獲全甲兵夫俱革其一年工食通扣在船修艌船隻凡差出拿逃兵者工食即日扣收在官拿獲有功之日給與其逃兵自首免罪拿到者春汛時月發船之期依臨陣在逃法示衆每甲倶有逃兵連坐捕盜每船倶有逃兵連坐哨官各哨俱有逃兵連坐領兵官依次連坐即行覺舉者免罪一兵逃甲長即時稟捕盜捕盜呈哨官轉呈把總呈府注冊拘該甲兵夫給文行拿一每月初一十五補兵即於廿九十四日該管捕盜募兵到船送付哨官帶到領兵官驗呈把總類驗本府驗中給與腰牌發總呈道收冊發船駕操一各船捕盜遇夜出哨脚船三板船俱要收藏穩便不許拖帶恐遇風急潮滚頓流者一船兵役取水不便誤失者管船兵夫一面治以軍法一面扣月糧賠造一在港每日清晨中軍船定營吹打三通放砲三箇升太平旗左右前後四營依序安擺各擂皷鳴金亦升太平旗一捕舵兵夫上岸買辦柴米及神福船具倶赴中軍船給籌票刻限時日回銷敢有不行稟明私自擅離及該管小甲互相容隱知而不舉者一體連治軍法一各船領兵指揮哨官捕舵兵夫風汛時月不許偸安假托事故在岸宿歇虚竊錢糧致誤事機者不分貴賤一體軍法重治如有警掌行號已畢而未到船已起椗而方來俱係畏避即發保候無功者斬一各船捕舵小甲兵夫各照安名分長幼尊卑務念同舟共命如父子兄弟相處不許嗜酒在船爭打違令喧嘩倶以軍法連坐然後另行發官問理曲直一兵與甲長凡事務相推讓惟甲長是聽甲長平時見捕盜一跪一揖遇中軍發放跪聽號令一捕盜見哨官平時皆一撒一跪一揖遇在中軍或臨敵以軍法施行一哨官見領兵官一跪一揖臨敵臨操軍法施行一領兵官戎裝見把總兩跪一揖平時許以冠帶臨操臨陣戎裝聽令小則徑自綑打一哨官見把總兩跪一揖臨操叩頭捕盜見把總叩頭捕盜見領兵官平時兩跪一揖臨操叩頭跪見一各船官捕兵役各備蓑衣箬笠一副以便遇雨應用毋得抗違或者曰兵船當在船上操豈有取兵下陸地而操水戰之理耶繼光曰海舟比江中不同戰賊時惟用風力帆檣之功但有舟利帆速者隨便勁上以間船之力耳海中風濤潮汐非内地江湖搖櫓整次之比也舟中旣不能操矣而不取於陸以習之不幾於棄之耶或又曰取之操於水寨是矣而又何以陸操繼光曰水陸之分可恨正在此逼賊登山將不捨舟步戰乎哉或者曰然以上擺船之說大端海濤洶湧港有灣曲闊狹當風隱風之不同隨港形深淺難拘一定之勢此言處寛迥水善之形耳設使狹如羊腸則又當單隻一字順下不可拘方也一每日日落時分聽中軍船上吹打三通放砲三箇各船一體鳴金擂皷落旗一夜暮以朦朧為期中軍船發擂三通起更各船齊擊竹梆打更者打皷一次梆響一遍每更用兵二名一名船頭遠視一名船尾高瞭遇有船過即便鳴鑼各船齊備儻水上有黑塊夜浮者恐賊人踏水偸椗支更兵夫速以石打一面高叫本船捕兵同看若是别物流入則已若是賊人即便鳴鑼打銃各船一體防備違令支更兵夫重治割耳因而失事者斬首常時水寨操習一每隔夜把總官先撦該操大旗一面於中軍船上示兵知之次日早掌號官先於船上五更吹長聲喇叭一盪各兵起收拾做飯約中軍船炊熟吹第二盪喇叭各兵食飯吹第三盪喇叭各官捕帶兵先登岸赴水寨擺立照圖一俟水寨演熟部伍然後照前操法以操兵船俟泊處關港潮平依法操於舟如其關港狹曲風潮不可操大舟者以小船摘甲長每甲摘兵一半用小船三板操其形狀之略一本總擺清道建五方旗皷進塲坐定中軍官稟放砲升旗又稟放靜砲三箇即放砲三箇諸營一時肅靜稟掌號笛官旗聽發放掌號笛官捕甲各執旗由兩邊路到臺下立定金響號笛止其立定之法每一船捕盜在前甲長旗挨次在後中軍官呼官旗過來齊應一聲先甲長次捕盜次官跪聽發放掌號官發放云官旗聽著耳聽金皷眼視旌旗駕船如馬見賊爭先同舟共命奏凱還師依次分付起立舵工跪過稟稱舵工聽發放發放云舵工聽著一舟之功全賴爾輩稍有歪斜不能直射賊舟者軍法示衆舵工起此後如有别事發放逐一講明起立中軍分付官旗下地方各應一聲鳴金大吹打各照原路回信地各領兵官照依臺上規矩於各營掌號發放畢聽各捕盜將本船甲兵盡數俱令跪聽其先發放扳招手曰船若著淺治爾之罪次發放繚手曰使風不正治爾之罪次發放舵工曰船去不能直射賊舟治爾之罪發放畢各營肅靜一下營中軍掌長聲喇叭三盪吹哱囉各兵起身再吹哱囉中軍旗幟擺出當中立定㸃皷各船捕兵依前畫港内列船式樣由中照前圖擺出仍為每甲一行每船各甲平行倶在塲之當中一行立畢金響皷止一面預於塲之盡首立左右二的左右相去一百步其的高六尺闊三尺每的下立高桅一根三丈粗不拘又立近的二座於左右的之中相去二十四步的高三尺闊一尺看中軍㸃何色旗其該營兵即聽吹天鵞聲喇叭擂皷各兵呐喊一船一船挨次近的一船之兵約去五十步即照前圖内閱視擺船圖相間擺開為一長圏趨的之中先鳥銃狼機射手照遠的打放火箭向高照遠桅放之其佛狼機預先立三架在彼臨時止用各船機兵到即打放不必擡行將鳥銃一遍狼機各一箇火箭一枝弓箭三發其鳥銃兵即向近的打石佛狼機手每人包火藥五兩向近的擲火燃之各色火器各放一件其標鎗手打標弩手放弩俱中近的為則各照方面攻打石矢各三發皷少間一船兵即於大前面抄旁而回又擂皷呐喊又一船到的照前行之又過旁抄回如此俱完則前一船兵復又如環輪轉再近的金響皷止鑼響即各於脚下上息乃將前四的四桅倶取立居中一字立之中軍掌哱囉各起身擂皷吹天鵞聲呐喊各兵四面向中攻打一番鳥銃不用銃子火箭高放火藥標石不必施以其四圍遠攻使賊不敢出露身體於船之上我可徑造而擒之此遠勢非逼近勢也如臨敵則自有一船逼近用標石火藥擲傾近攻不可預習如此一陣金鳴皷止摔鈸響各收成每甲一行每船為一方立定再摔鈸響收照原出在港圖次立定放砲三箇鳴金大吹打挨次照初出擺營序列回還原劄信地立定鳴鑼坐地休息各官赴臺下稟操畢中軍稟比較先列佛狼機六座立一百步的一面豎起紅旗各船佛狼機手通赴臺下立聽唱名打放每人三銃中一者量賞中二者平賞中三者超格重賞不中者打罰如比較陸兵格眼次立八十步的一面豎起紅高招各船鳥銃倶集臺下照佛狼機試打賞罰次立六十步的一面豎起黄旗各弩手射手火箭手通赴臺下每人亦三發亦照銃手行賞罰次立二十步的一面豎起藍旗各船標鎗打石手俱赴臺下每人三發亦照銃手行賞罰次立白旗各船刀手鈎鐮手鎗手倶赴臺下先每名單看使舞手法身法步法次斬馬刀與長鎗較次义鈀鈎鐮與長鎗較看其遮當何如但能任鎗誘哄執立不動目不瞬視候到見肉分鎗就使不能遮架亦為第一等若一見鎗來遠近迎架頭搖身傾手動足亂即為生疎且其人無膽或治或革惟公道行之是為下等倶演畢放砲落旗散操各船三板倶來岸下候兵登船歸䑸每演此一遍則演陸操一遍不拘二項但操一遍歇一日水操每月一五九十三十七二十一二十五二十九日陸操每月三七十一十五十九二十三二十七日其陸操照依本府陸兵新書内止操自一隊起以至一官者止不操方營與前一半蓋水兵有水操太勞故也其武藝各照所執比較一如官旗調集臺下之法一放火磚火砲火毬之法須火線燃之將入方可擲下不然擲而滅就不滅賊可反手正當發時反為所害一火箭只著棚帆當中一㸃打去常高中則不可救低則易救一弩弓不可遠遠則無益徒費矢竭力一標鎗非兩船相逼不可用往下打更難准一打石著人頭面方打不可空往船上擲之一賊船如近我船便傾下火藥一二桶少則無用連桶則恐滚擲水中須傾桶倒下一面用一二人用鐵鍁執炭火數鍁隨藥擲下火多則必有燃藥者或用粗碗一箇種火一碗用灰蓋之放於桶口擲藥之時碗内火同藥傾及船一磕而火藥相粘必發難救此第一全勝捷徑妙法智者不能施其巧勇者不能用其力也發船號令一隔日先行牌諭各捕兵將以出洋若干日該備鮝米水數目令備完限時㸃查欠者綑打罰工食凡中軍吹長聲喇叭一通立起黄旗一面各哨船出洋哨賊如報有警本總即升船廳聽砲三箇大吹打畢先吹哱囉一盪各船一面起􅖼掌號笛官捕旗甲倶坐三板赴中軍船下兩邊照營列定掌號官稟稱官旗到齊聽發放船上叫官旗進來水倉門報門俱赴船面掌號官叫官旗過來以下倶照常時在於水寨操練䂓矩發放畢各官捕回船亦照寨操一體發放畢中軍船擂皷升行旗吹第二盪哱囉響各船起篷第三盪哱囉依次開船夜洋行使首尾相接鴈行而進不許太相逺離䑸哨一船違令捕盜之罪二船違令哨官之罪四船違令領兵官之罪中軍畏縮把總之罪其舵工繚手皆加倍重治遇有船漏風水不便者覈實免罪遇夜洋行船一各船以燈火為號中軍船放起火三枝放砲三箇懸燈一盞各船以營為辨前營船懸燈二盞平列左營懸燈二盞各桅一盞右營大小桅各懸燈二盞平列後營懸燈二盞一高一低看燈聽銃收䑸船到將近船上捕盜先自呼名識認一遇夜泊船聽中軍船招䑸喇叭響各船依序隨䑸安插不許私求穩便遠泊因而疎虞斬首示衆哨官連坐一守夜號令俱同在港號令但每夜加鳥銃手二名㸃火執銃遇疑即便對放一各船遇夜有急看中軍旗五方高豎燈五盞是欲設疑以見船多之意每船後尾上立燈左右一盞前桅上加燈二盞臨敵號令軍法一中軍船戰聲喇叭響各鳴鑼齊擂戰皷天鵞聲響大聲呐喊奮勇𠞰殺獲有功級各送領兵指揮驗實類送中軍紀驗解報退縮後至者斬其捕盜船行遲曲而後到者斬其捕盜舵工遇淺者斬其扳招手船雖先到而不直射賊船傍邊擦過者斬其舵工繚手使風不正者斬其舵工繚手如已使逼賊舟相幷不能成功致賊舟復走者斬其捕盜各甲長有能挨報某兵不用心某兵不用心者其不用心之兵斬首甲長止於綑打一敵人慮我官兵追戰將船内器物遺棄水中兵夫敢有撈拾而不追賊者許本船捕甲割耳示衆故縱者連坐斬首一凡已打敗賊舟一隻而餘舟不行分投追打别賊共相攢來爭撈首級致賊遁走者各船獲級俱止歸先打一船之功餘船捕盜綑打一百割耳其一船雖已逼到賊舟而未即打敗餘舟接應會同用力者不在此例一各船遇敵敢有畏勢揚帆遠望逗遛不進者捕盜舵工倶就陣斬首示衆一各船放銃須將火藥收藏安便免至火星爆入貽患匪細儻有失誤銃手管藥兵夫一體軍法施行一各船打敗倭冦所撈獲財物包裹聽船捕盜從公分給以多半付動手首功之人餘皆均處敢有官捕頭目勒分甚至夾打追侵公然放肆者許各兵徑於回日赴官告首決打重治加倍追付各兵頭目依律治罪其軍器則要報官解驗不許各兵隱藏一與賊船對泊船􅖼􅀈上用猫竹擘開包裹􅀈上以防敵人夜竊之患違令􅖼手綑打一各船遇警聽中軍船天鵞聲喇叭響各船鳴金皷一通捕兵大聲呐喊以壯軍威違令治以軍法一各船遇警捕舵兵夫不許解衣而臥違令察出治以軍法一報警至急起􅖼不前即使用大猫竹一段計長一二丈縛於􅖼􅀈浮水以便班師各自認取違誤􅖼手割耳示衆一各船捕舵兵夫遇泊船山澳無故不許上山閒遊恐遇警一時下船不便致有誤事若要取水輪直兵夫赴中軍船告稟明白方許取水違令上山人拿治不恕松海島嶼外洋哨船發火號令一健跳者北至金齒門南至漁西其信地則青珠山茶盤山青門黄茅覽一桃渚者北至牛頭門南至聖塘門其信地則獺鰻山白達山米篩門一海門者北至擔門南至三山其信地則擔門山三山頭一松門者北至深門南至鹿頭其信地則􅀈頭山猢猻尖道士冠山大高城山鹿頭山一隘頑者北至雞臍南至派爿洋其信地則沙角山靈門山一楚門者北至邳山南至茅􅟠山其信地則久爿山老宮前山一往來巡哨遇有警急各在信地登各相近山上先行舉放煙火所在兵船瞭見火光煙焰就行開帆望火前進哨𠞰聨近烽堠即時按放傳報南北大兵防截其哨船仍探賊船向往踪跡親報領哨官以便進上如火報不爽兵船逗遛誤事罪坐該營領哨官員若哨船不盡信地止於一處探望或在漁樵船隻人内取信或到山放火而原積柴草不足火小不能燎遠致失傳報誤事者該直哨船軍甲俱以軍法斬首福船說夫福船高大如城非人力可驅全仗風勢倭舟自來矮小如我之小蒼船故福船乘風下壓如車碾螳蜋鬭船力而不鬬人力是以每每取勝設使賊船亦如我福船大則吾未見其必濟之策也但吃水一丈一二尺惟利大洋不然多膠於淺無風不可使是以賊舟一入裏海沿淺而行則福舟為無用矣故又有海滄之設海滄說夫海滄稍小福船耳吃水七八尺風小亦可動但其力功皆非福船比設賊舟大而相並我舟非人力十分膽勇死鬬不可勝之然二項船皆只可犁沈賊舟而不能撈取首級故又有蒼船之設蒼船說一名艟􅬋又蒼之大者夫蒼船最小舊時太平縣地方捕魚者多用之海洋中遇賊戰勝遂以著名殊不知彼時各漁人為命負極之勢亦如賊之入我地是也今應官役便知愛命然此船小而上高不過五尺就加以木打棚架亦不過五尺賊舟與之相等旣勢均不能冲犁若使徑逼賊舟兩艘相聨以短兵鬬力我兵決非長策多見誤事但若賊舟甚小一入裏海其我大福海滄不能入必用蒼船以追之此船吃水六七尺與賊舟等耳其撈取首級水潮中可以搖馳而快便三色之中又此為利近者改制為艟􅬋比蒼船稍大比海滄更小而無立壁最為得其中制遇倭舟或小或矮皆可施功但水兵人技皆次於陸兵設使將水兵敎練遴選亦如陸兵而後登之舟中則比陸戰加一舟險其功倍於陸兵必矣司寄者何憚而不為哉三船利鈍說大端天若風動勢順則滄不如福蒼不如滄若風小勢逆則福不如滄滄不如蒼其開浪網船之類皆可備哨探而不可戰者開浪以其頭尖故名吃水三四尺四槳一櫓其形如飛内可容三五十人不拘風潮順逆者也又不如八槳船左右十六槳後一櫓更為飛迅但坐臥處不冠冕耳網船形似織梭内容二人前後用二人以罩罩之風波大又可拖之塗上且不能覆吃水七八寸耳此可走報或用之裏港窄河動以百數每隻内用鳥銃二三人蜂集蟻附沿淺沿塗而打之甚妙如賊追逼就可棄走一舟不過一金之費耳相冦情小舟數往來者謀議也遲而審顧者疑我也欲進而復退者探我也旣退而卒進者襲我也皷噪而矢石不下者兵器少也却而顧者欲復來也先急而後緩者整備也促皷而不戰者懼我也泊而揚帆者欲出不意也旣退而不速者謀也火夜明而呼噪者恐我襲彼也擲纜而即起者欲擇其利也火數明而無聲者備器也夜泊而趨於泥涘者鄉道欲往也促纜而不呼者急欲逝也促纜及流懸燈於途者夜逸而潰也久而不動者偶人也皷而無韻者偽響也近岸連村而不登劫者怯也不久困請和投降者詐也謹行泊我舟在洋出哨追趕賊船天欲昏黄潮時將盡不可貪程一意前往須防今夜自安泊處恐無收嶴風至之虞遇龍潭神廟不可放銃吹打呐喊或有驚動起風作浪之失早晩占看日月星雲氣色飛鳥預知風雨未到晚黒便收嶴岩高登四瞭恐隔山先泊賊船而我不防也浙東潮候初一初二十三十四寅申長己亥平初三初四十五十六卯酉長子午平初五初六十七十八辰戌長丑未平初七初八十九二十己亥長寅申平初九初十廿一廿二子午長卯酉平十一十二廿三廿四丑未長辰戌平廿五廿六寅申長己亥平廿七廿八卯酉長子午平廿九三十辰戌長丑未平一朝生為潮夕生為汐晦朔弦望潮汐應焉故潮平於地下之中而會於月潮生於寅則汐於申潮生於已則汐於亥陰陽消長不失其時故曰潮信定太陽出沒以應潮信時刻長短正九出乙入庚方二八出兔入鷄塲三七發甲入辛地四六出寅入犬藏五月生艮歸乾上仲冬出巽入坤方惟有十月與十二出寅入申仔細詳定寅時正九五更四㸃徹二八五更二㸃歇三七平光起寅時四六日出寅無别五月日高三丈地十月十二四更二仲冬纔到四更初此是寅時須切記行船觀日月星雲占風濤一日暈則雨月暈主風何方有闕即此方風來也一日沒臙脂紅無雨也有風須看返照日沒之前臙脂紅在日沒之後記之記之一星光閃爍不定主有風一夏秋之交大風及有海沙雲起謂之風潮名曰颶風此乃颶四方之風有此風必有霖淫大颶同作一凡風單日起單日止雙日起雙日止一凡風起早晚和須防明日再多一有暴惡之風盡日而沒一防夜起之風必毒一凡東風急風急雲起愈急必雨起雨最難得晴一凡春風易於傳報一日南風必還一日北風雖早有此風向晩必靜一防南風尾北風頭南風愈吹愈急北風吹起便大一春南夏北有風必雨一雲若砲車形起主大風一雲起下散四野滿目如煙如霧名曰風花主風起一雲若魚鱗不雨也風顚一凡雨陣自西北起者必雲黒如潑墨又必起作眉梁陣主先大風雨後雨急易晴一水際生靛青主有風雨一秋天雲陰若無風則無雨一海燕忽成羣而來主風雨烏肚雨白肚風一海猪亂起主大風一夜間聽九逍遙鳥叫卜風雨一聲風二聲雨三聲四聲斷風雨一鰕籠張得􅀈魚主風水一水蛇蟠在蘆青高處主水高若干漲若干若頭望下水即至望上稍慢一月盡無雨則來月初必有大風雨俗云廿五六若無雨初三四莫行船春有廿四番花信風梅花風打頭楝花風打末逐月風忌正月忌七八日風乃北風也二月忌初二北風三月忌清明北風五月忌雪至風以正月下雪日為始算至五月乃一百二十日之内主此風六月十二日忌彭祖風在前後三四日七八月若有三日南風必有北風報之九月九日前後三四日内忌九朝風十月忌初五風在前後三四日内十一月冬至風臘月廿三四掃塵風戰船器用說夫水戰於舟火攻為第一籌固然也其火器之屬種目最多然可以應急用者甚少何則兩船相近立見勝負其諸器或有宜於用而制度繁巧一時倉忙不能如式擲放致屢發而無用或精巧宜用而勢不能遍及一舟或重贅而不能發及賊船最不宜者是見行火器安藥線在口如若候點入口則發在我手若方燃即擲則擲下又為賊所救又有所謂灰瓶者内用石灰蓋舟上惟利滑使人不能立脚一說用鷄鴨卵擲下或擲滑泥者尤可今乃用灰瓶是又澁賊之足而使之立牢也不可不可今屢試屢摘合以衆情共愛而數用無異者止有二種一遠一近至矣足矣愈淫巧繁多愈無實用記之記之一舊用火藥傾下賊舟此固長䇿然又别用火器或炭火再傾擲使之發藥每每或連桶擲入水中或被賊乘藥桶及伊舟以水沃濕亦皆未中肯綮可以必發故復重出此說因以見此法之萬分至妙也所謂二種者遠則只用飛天噴筒近則只用埋火藥桶至易至便萬用無差除此之外所謂火箭神機火磚噴筒之類皆遠不及此茍具此一種則他種又皆不必用也右約賊船在遠先將炭火燒紅盆盛一處約賊舟相近百十步以火入粗碗灰培再俟賊近三二十步以碗平放在藥桶内蓋了俟兩舟相逼將桶平平擲下至賊船被磕動碗内炭火跌泛而出與藥相埋即發時刻不失較之别器尅線不燃及線濕放早之病皆可無矣走風捉颶事急追賊車關人力起􅖼遲誤備此臨急解繫􅀈尾泛之以便回取截粗徑二寸竹布篐用硝磺砒霜斑毛剛子碙沙膽礬皁角銅緑川椒半夏燕糞煙煤石灰斗蘭草草烏水蓼大蒜得法分兩製度磁沙玉田沙炒毒繫鎗竿頭順風燃火則流淚噴涕閉氣禁口守城用戰船只用飛天噴筒燒帆為第一妙器此又不足用也此乃各處見用於兵船者爾用地鼠紙筒砲各安藥線每五箇排為一層上下二節各二層以薄篾横束合洒火藥松脂硫黄毒煙用粗紙包裹成磚形外用綿紙包糊以油塗密另於頭上開口下竹筒以藥線自竹筒穿入紙薄拳大内蕩松脂入毒火外煮松脂桕油黄蠟燃火抛打煙焰蒺藜戳脚利水戰守城俯擊短戰硝磺樟腦松脂雄黄砒霜以分兩法製打成餅修合筒口餅兩邊取渠一道用藥線拴之下火藥一層下餅一箇用送入推𦂳可高十數丈遠三四十步徑粘帆上如膠立見帆燃莫救此極妙極妙萬方效策範大砲紙糊百層間布十層内藏小砲半入毒半入火又間小砲入灰煤地䑕頭帶火磁沙炒毒鐵蒺藜糞汁毒炒包松脂硫黄毒人髮角屑等件此一火器戰守攻取水陸不可無者奪心眩目驚膽傷人製宜精妙此尤兵船第一火器紀效新書卷十八
