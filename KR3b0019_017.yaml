body:
  text: 紀效新書卷十七明戚繼光撰守哨篇第十七守是攻之䇿自古名將必先斥堠但此等事不過衛所之行移非教戰士之技不能編次諸篇之間故為附卷一為軍務事照得衛所烽堠為邊防第一要務近來該管陸路官員多不曉此每遇考選是任便為間散之局甚至廢棄職守或臺堠不修或器械不整如軍士偷安略無懲究寇犯地方則烽火之號不傳船隻在海則聲息之警不報萬一失事甘受參提殊不知懲沸湯者吹冷􅐽傷弓之鳥驚曲木自能省此便當寒心豈可玩歲愒日甘蹈如前及查松門桃渚衛所原設烽堠有遠在外海而軍士藉此偷安如獅子望火樓等處是也有置於內地而遇警瞭望不及若盤馬烏沙浦等堠是也已曾舊有行令堠軍於近海去處照依漁户搭蓋橧架一般上則用草苫為一厰各置守瞭器具每堠每日輪軍三名遇有賊船出沒晝則卓大白旗一面夜則放炮起火在堠軍餘接警傳報如在外海遠堠每每密切差人查閘此時地方廣闊未經核實而奉行者十無一二即今風汛正臨海洋賊船叵測內地安危居民趨避兵機預備城池警守均當責在一堠之司一堠失報則地方貽害萬萬矣為今之計除行取各衛所管堠官軍前來本職面授烽火方略形式號令使各遵守外所有條列報警事宜擬合申飭通行為此牌仰本官照牌事理即將後開條約事件備録每墩一本付軍讀誦背熟其條內事宜平日務各件件備完停當隨壞隨用者隨補隨完遇有警迹務要依後條欵舉放傳報敢有一件不完一軍不到查問得出定照軍法連坐決不輕貸先將各堠旗軍備完件數該管官具結繳來查考以憑或時委官或本職自坐小網船沿途暗往親驗其給過牌內條欵陸路官先行讀背痛熟面教各堠軍名名讀誦背記痛熟限一月外以憑本職調來或到墩考背生一句打一棍不恕今開墩堠該備什物一每墩立五人睡住臥房一間不拘草瓦竈一口水缸二箇鍋一口碗五箇碟十箇米一石鮝十斤種火一盆種火牛馬糞一擔一器械碗口銃二箇小手銃三箇火箭九枝大白布旗一面方十二幅草架三座草架法每架務高一丈二尺方四面俱一丈下二尺高用木橫閣使草柴不著地不為雨濕所浥上用稻草苫蓋如屋形伏覩祖宗墩法舉狼煙南方狼糞既少煙火失制拱把之草火然不久十里之外豈能目視且遇陰霾晝晦何以相瞭故必用立此大茅屋積草柴既多火勢大而且久庶鄰墩相望可見其屋內不拘柴草務相均停一層柴一層草填實盈滿墩堠報警號令一每墩不拘日夜分三人帶起火三枝碗口銃一箇手銃三箇在於極外海邊巡邏守哨遇有賊登晝則搖旗放銃為號夜則放起火放銃為號墩上即便接應如天晴則卓十二幅大白旗相鄰之墩卓起大旗一路只至本府所在之處及一路至本衛所城池而止如若遇天日陰霾有雲霧望旗不見則將原搭草屋舉火連草屋通聽燒然一架鄰墩接放火則已如不接放又燒放一架夜遇有警看近海下墩哨軍火箭號響止燒放草屋一座蓋夜間火甚明不必二座也鄰墩即便一體點放草屋賊到之墩一面差一人由便路徑到本衛所並陸路官處報賊多寡登犯時日情由聽該衛照本府原發報式轉報墩軍號火走報軍法一賊所登犯之地本墩失誤放火卓旗遇賊流至鄰墩之下鄰墩放火卓旗而本墩後接者全墩軍法示衆一遣下墩海邊人役失誤者罪坐下墩海邊之人墩上者連坐捆打一百一近賊本墩放火卓旗而全墩接應失誤者鄰墩軍法示衆一舉火遲延走報不時因而誤事者軍法示衆一風汛時月墩軍不拘正墩鄰墩敢有下墩回家及雖近墩而不在墩者無賊至捆打一百割兩耳有警軍法示衆該管官捆打穿耳連坐一應備前項什物軍器欠缺一件者墩軍捆打一百割耳仍罰月糧置辦該管官連坐捆打一應備前項什物軍器雖不欠缺而不如法者墩軍捆打四十扣月糧改置該管官以分數論罪治以軍法查點墩堠法式一每月本職十次把總七次衛所五次各差人本府於見駐之處起南北分發人員點閘如有不到者即便綁解治罪或本府自坐小網船由潮不拘時日親閲查點一凡差人員點堠敢有需受分銀粒米與墩軍所得之罪一體均治雖素親信並不輕減一差閲人員不親逐墩到上却乃在於總路拘查或托人代查及到墩而又點查不明者一體捆打沿墩示衆一差查人員到墩先數軍足五名即看種火之處火種有無次看火箭收拾藥線可否次看大小銃裝收何如次看十二幅大旗有無損壞次看大旗桿堅直何如次看烽火草屋三架柴草有無雨濕漏壞有無損用致欠原數次看水缸有無水次看米鮝見存用過數目次看碗碟睡臥處所是否在墩宿歇一遇警之時但經放過軍器草屋不許過三日即要補完違者治以缺欠法條墩軍守瞭之法一墩軍每風汛時月如三四五六盡數在墩不準以取米糧破調正二七八九十十一十二月準以一名專運薪米每二名為一班分為二班每半月一更赴墩一官府經過止可擊鑼放小手銃一箇不許擅卓大小白旗燈籠烽火等項以疑鄰墩違者以妄報聲息軍法重治守城一為軍務事照得風汛迫臨海警叵測捍禦之方惟在戰守已該本職見在操練標下官兵臨機調發外但查各衛所城守無法每遇寇至則倉惶失措或致掩襲不備甚者守禦無法無警之時晝夜耗人精力及至五更往往倦怠失事是皆已往之咎而事豫則立正宜先機分布夫守城之法惟蓄養精力有餘而賊來貴在遠知預備其逺知預備之責又在陸路但伏路官軍亦多因襲舊套虛應故事緩急之間全無實賴均合示授方略號令以嚴責成為此牌仰本衛所官照牌事理即照發去圖式號令條欵將本衛所旗軍丁舍人等止除出海墩陸人役不𣲖垜口外其餘自舉監生員致政供貼雜差及應襲以下盡數照依後開條件圖式或四名一垜或三名一垜或二名一垜每五垜另編立知事勤勇一人充為垜長專一執厰旗查督大約以一城人丁衆寡通融不必拘泥原分窩鋪其陸路官員亦照原曾發去方略一一遵奉施行通將編泒過旗軍丁舍照式攢造書册一本同各官依準申繳其守城號令仍動支不拘何項官銀刊刷成書每人一丁給與一本以便熟習毋得徇情遺逸及違玩軍令自甘重典未便𣲖守城規則一除舍人并編中軍者俱聽策應官帶領隨賊緊處分投往來捍禦對敵不泒垜口次𣲖神兵先將本城內衝要處所共幾處每處量其險要該用佛狼機幾座大銃幾箇於各多所分抽其多者撥充其餘照各所地方城身均泒次𣲖鳥銃通計本城共有若干垜口見今通有若干邊鳥二銃各照原城所分泒稀密得宜如有所伍太多者取加衝要之處次𣲖官將掌印官專管中軍高處號令四面皆聽所督仍兼附近中軍要城一處乂將險要門臺幾處𣲖以見在衛所指揮千戶之有力勤勇者次將各掌印百户一官一旗分𣲖各原經本府編過信地樓鋪各相接界如一百户署數印則本官止在本伍樓鋪餘則以旗甲一名分守各鋪本官仍往來兼管凡有力千户與指揮同𣲖無用指揮與千户同泒次將在城生員致仕省吏照所分泒樓鋪次將各所伍信地一城共有若干垜口凡上團下團上下餘丁雜差供貼守城等軍餘丁通計共有若干每垜口一箇約合幾人計算已明然後挨所挨照本府所編信地一軍一餘或多許均附一軍一餘之外湊合泒垜編成字號如一所垜口已盡而軍餘有餘則挨於下伍相鄰垜口如垜口未盡而一所軍餘已盡即以相鄰所伍軍餘兼搭接泒惟據軍餘照人均泒不拘所分定額以致厚薄疏密失宜一每五垜為一厰內選年壯膽勇者一名立為垜長一泒定先演三日候本職親臨演之如泒撥不明不均不公定將掌印官軍法處治當時奪其管事罰以重差守城該備器具厰屋一每垜口五箇立草厰一間下用板鋪勿使泥濕傷人上用苫蓋四面皆堪遮蔽風雨遇至樓鋪者即聽以樓鋪充之不必另立每厰竹竿一根長一丈三尺上用布旗一面疊方二幅顏色照城方向一每垜口有幾丁每丁用一尺高有底通節粗竹筒一箇埋在垜口裏面各軍所執器械或短鎗或斬馬刀或鳥銃或弓矢插於竹筒內立之一垜口二箇其泒過該守本垜之人不拘幾丁共出燈籠一盞其應卓燈繩桿燈底墜石雨罩俱照圖式一每厰垜長出燈籠一盞卓於草厰橫竿上並樓鋪旗竿上以照城裏面此厰完同驗一每垜下要石子五六斤重以至一斤半重者高圓三尺一堆大圓石可五六十斤者五塊此文到即該預備完足欠一寸者罰糧一月無糧罰挑濠一丈一有鐵架燒松節者從便每一架準燈一盞此預備一每垜竹木梆一箇每鋪百户備大小鼓二面鑼一面但城內有鼓者皆許借用此待賊至方用賊去即聽交還打壞以守鋪軍糧扣賠新鼓無賊時不許指此誆騙如無借處即便預將守城紀録老小軍丁內扣糧速辦限文到十日內此有警備用今先備候本職親到驗之一每鋪遇警種火一盆俱守鋪人丁備此臨守城日時備也一每一厰大水缸一箇貯清水此臨時備一各色火器俱要預備齊整責令泒到鋪邊垜口之人管列在鋪聽候不時之用此預撥在鋪一各神兵照𣲖過垜口所在每一架處搭高厰一箇將佛狼機等銃在其下遇警火草時時點候鉛子銃心裝蓋停當藥線裝收乾燥其一應木馬鉛子石子銃送等項俱照本府舊日為緊急軍務事頭行內數目件件完足聽不時查點如遇敵用過敵退準從容五日之外補足如敵尚在限一時之內補足過期軍法重處此預備點查各預收𣲖到臨近鋪內貯閣候臨警取用一守城鳥銃手每人藥一斤裝管五十三箇鉛子五十三箇火繩每根三丈此該點查臨警帶上城一中軍惟看城外伏路及墩堠原定晝夜煙火旗炮起火號令但見前項有警號令掌印官即便將中軍高處晝則放火炮三箇卓起大白旗在城大小官軍旗舍舉監生員致仕人等盡照泒過垜口即時各執器械厰旗上垜乘城照依號令一夜則放炮三箇卓起雙燈籠二盞在城前項人等一照白晝事例上城遇夜中軍發擂樓鋪一齊發擂中軍打更遇夜鋪處處打更一處斷絶更鼓依臨陳軍法連坐本管官旗守城號令一凡遇有警但看城上中軍內晝則放火炮三箇卓起大旗各人照𣲖信地垜口火速上城夜則聽中軍高處放大銃三箇卓燈二盞各人照𣲖信地垜口上城凡上城時即將器械插於竹筒內垜長將旗插於草厰邊照垜不拘一垜幾人俱向外立定視賊來遠則佛狼機近則鳥銃再近打石子等類難以預料如賊退或探賊未來盡如探賊歸巢其巢在十里之外看中軍高處放炮落旗每垜留一人城上看瞭餘俱下城休息聽中軍前令上城一凡遇夜則五垜之人不拘通有幾丁看中軍高處放炮舉雙燈通上城照垜向外立聽中軍放炮落燈每一厰內之人先輪一垜者或二名或三名支一更餘俱入厰安睡一更盡吹長聲喇叭轉更又一垜者輪出敲梆守更守過者進厰同睡不許脫衣如此五更五輪輪完天明若遇夜間忽聽中軍高處炮響卓起雙燈是看賊來攻城各厰內不該支更人丁盡數起出向垜口備戰一處有賊擂鼓敲鑼滿城鋪俱擂鼓敲鑼一鋪鑼鼓止挨鋪通止如賊已退候中軍高處放炮落燈各丁又俱進厰睡輪該守垜照舊支更一人丁雖不令俱在垜下立到天明所以休息人力務使精神有餘免致每夜到四更人倦失更被賊掩襲入又不許一人因而乘機私歸家內安睡既許開厰內輪睡又不許説話依舊厰內困倦了及至輪該執更却值渴睡守城軍法一凡一厰內一人不至或夜歸私家連坐垜長各打二十棍本犯割耳同垜同厰連坐遇賊攻打城池之時而不到者本犯軍法示衆垜長割耳同垜同厰捆打一凡旗厰器械矢石火銃三鼓之類一件不完者本犯捆打坐連同垜同厰五垜以上本官俱捆打衛城五鋪以上所城二鋪以上掌印官旗本管官捆打臨賊攻城之時以致缺少及放及分不如法者本犯軍法示衆照前連坐者皆割耳一回頭者割耳一擅行動者割耳一見賊大言喧譁者或被傷高叫驚走者遵照臨陳退縮軍法示衆一夜驚者治其所由同厰同垜本管官旗連坐一中軍高處接應在外並墩堠號令遲法者掌印官重治瞭堠司號之人軍法示衆一在外伏路墩堠誤事致賊猝至者究其伏路官軍以法一各鋪內遇守城時或致種火斷滅與凡傳敲鑼鼓或起或止不明俱罪該管百户如一百户而兼數印不得分身者罪其旗甲百户從輕發落天字五號止即接地字一二三四五號又接玄黃字號俱倣此式刊版填造書册各城內建立中軍號令一應備什物先於本城高處可以四面瞭視之地立桅竿一根粗徑一尺長五丈上用棕繩一條粗大耐久者又用布十二幅旗一面即於旗竿下或就樓鋪或另立房屋一所預備燈籠四盞亮好油燭一百二十枝大將軍炮一箇碗口響炮四口即以原𣲖管神兵守之其隨銃應該小馬火藥火繩送子等件俱照神兵頭行備足仍將好軍十名專管種火一盆日夜分班四瞭城外陸路號火銃炮撥吹鼓手一副八名專執此處號令不拘何事不許差扯號令平時無警之日每早天明吹打一通守城人下城每晚吹打一通守城人上城凡遇有警每夜日入山不見便放大炮三口卓起雙燈城內人丁聞炮看燈即便上城守夜俟定更炮響起更時雙燈放落各處支更守城人照守城項下條約施行所撥十人分更向四面瞭看城外伏路人動靜凡伏路人在於城外不拘晝夜但放起火三枝炮響三箇是有賊來偷城中軍瞭見如是白晝則放炮三口卓起大旗城內人丁盡數火速上城守禦一照守城號令條約賊去落旗人丁休息若夜間瞭見城外不拘何面伏路人放起火炮響則卓起雙燈二盞放大炮三口厰內人丁盡數出向垜口以備攻打賊退後落燈各人丁仍還厰內休息一軍法凡伏路人已舉火號而中軍接應遲延毫刻或炮鬆不致大響以致在厰之人聽聞不明及燈籠不亮者致賊突到城下攻城登雉掌號鼓手瞭望人役以軍法示衆決不貸生掌印官捆打一百割耳凡平時各應備器具什物不完者應備之人軍法施行掌印官連坐伏路一發人伏路凡風汛時月每城陸路官將伏路人役照城外要口四面共有幾處每處撥三人每人管二更俱於每日午時赴陸路官處領起火六枝手銃四口各照𣲖過信地方向出城離三二里之遠守伏每至次日午時有人交代方許回家若遇有賊在近每路每方加撥五名每人止執一更應備什物一每陸路軍每一名自辦三眼手銃一把好起火六枝火繩隨時辦用每人燈籠一盞小黃旗一面雨具一副發伏路號令一凡白晝遇有賊至即放手銃三箇起火三枝搖展黃旗馳回中軍高處照給過號令接應城內人丁又照中軍號令上城守禦一凡夜遇賊至伏路人先覺即放手銃三箇起火三枝一面奔告城下中軍高處瞭見照給過號令舉動厰內人乘城備戰伏路軍法一凡伏路人出伏遲期及備該隨身前項火藥不如法藥繩藥線濕落不堪雨具不整及在外之人不候交代而輒回家者通以軍法捆打一百割耳如有誤事軍法示衆陸路官連坐紀效新書卷十七
