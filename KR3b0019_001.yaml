body:
  text: 紀效新書卷一明戚繼光撰束伍篇第一治衆如治寡分數是也分數者治兵之綱也束伍者分數之目也故以束伍為第一由此而十萬一法百陣一化咸基於此原選兵兵之貴選尚矣而時有不同選難拘一若草昧之初招徠之勢如春秋戰國用武日久則自是一様選法方今天下承平編民忘戰車書混同卒然之變自是一様選法大端創立之選勢在廣攬分揀等率均有所用天下一家邊腹之變將有章程兵有額數餉有限給其法惟在精第一切忌不可用城市游滑之人但看面目光白形動伶便者是也奸巧之人神色不定見官府藐然無忌者是也第一可用只是鄉野老實之人所謂鄉野老實之人者黑大粗壯能耐辛苦手面皮肉堅實有土作之色此為第一然有一等司選人之柄者或專取於豐偉或專取於武藝或專取於力大或專取於伶俐此不可以為凖何則豐大而膽不充則緩急之際脂重不能疾趨反為肉累此豐偉不可恃也藝精而膽不充則臨事怕死手足倉卒至有倒執矢戈盡乃失其故態常先衆而走此藝精不可恃也伶俐而膽不充則未遇之先愛擇便宜未陣之際預思自全之路臨事之際除己欲先奔猶之可也又復以利害恐人使詐他輩為己避罪之地此伶俐不可恃也力大而膽不充則臨時足軟眼花呼之不聞推之不動是力大不可恃也興言至此則吾人選士之術荒矣夫然則廢四者而别圖之亦不可也蓋四者不可廢而但不可必耳諺曰藝髙人膽大是藝髙止可添壯有膽之人非懦弱膽小之人茍熟一技而即膽大也惟素負有膽之氣使其再加力大豐偉伶俐而復習以武藝此為錦上添花又求之不可得者也然此輩不可易得思其次則武藝尚可以教習必精神力貌兼收三者兼收又不若憑各親識鄉里哨隊長舉首蓋渠皆生長同閈觀其所忽也久矣此又不可以憑選者之目也所奈此數者皆選兵之一籌而必膽為主膽之包在人心腹中不可見何以選為殊不知人之精神露于外第一選人以精神為主而當兼用相法亦忌凶死之形重福氣之相此盡選人之妙矣最勿使伶俐油滑寧用鄉野愚鈍之人畏官府畏法度不測我之顛倒之術誠信易於感孚愾氣易于振作先以異出常情之威壓之使就我彀中而即繼之以重恩收其心結之以至誠作其威則為我用命無疑此萬試萬效之方也若愛先玩于前而後繼之以威則怨叢而恩不感矣是故遵令奉法臨事用命所以成天下之功辦天下之事雖小而家人父子邑里之細畢竟克濟者威嚴而已但威不能自行永守保無阻壞而所以使威嚴之永行無阻壞者恩與信也彼天下之至親至情莫慈父之于孝子若也子之聽命于父者以其生我也育我也設使父必于殺子雖孝子且不能無私言况烏合之衆行伍之兵耶是以必須恩以佐使其威嚴庶威嚴為之畏為有濟不然則威之反為怨嚴之反為敵矣如載人者舟之功而所以使之載者則舵也威嚴其舟乎恩信其舵乎此予數年之獨秘雖後日名將之出必不易予言也原授器選兵既得其道矣其法不過相貌精健而四十上下皆健也二十以上皆健也所用之器必長短相雜刺衛兼合而我之選士若無分辨一槩給之則如藤牌宜于少壯便健狼筅長牌宜于健大雄偉長鎗短兵宜于精敏有殺氣之人皆當因其材力而授習不同茍一槩給之則年近四旬筋力已成豈能以圓徑二尺之牌而跪伏委曲蛇行龜息以蔽堂堂七尺之軀伸縮進退出沒以縱横于鋒鏑耶若狼筅長牌等授之以少年健兒則筋力未成豈能負大執重若老成之立于前行以為三軍之領袖翼蔽也哉今將編選授器之法開條于後一編立隊伍籍記年貌貫址之法必在選時一日内了當若待次日則我所選中之人又更换一半矣何則新集鄉民不知法度惟聽熟人之言倏起投兵之思則一時恨不入選威嚴之臨或有人恐以禍福倐生畏悔之念便就又要回家渠葢此時既未受約束又未食錢糧不惟無所繫抑且無所畏日選日更無時可定矣其法一面用白牌上書一號編營伍在此傍註某官生管二號記縣分都圖在此某官生管三號記年貎疤記在此某官生管四號記尺寸筋力在此某官生管五號記居住地名填年月在此某官生管六號登錄文册在此某官生管又在空地别立一旗標以待後項選過者一將此六號白牌分為六處挨號順擺在於丹墀兩邊務每牌下留空地可容一二隊人以便編記每一號牌下用桌一張櫈二條與官生坐書手一二名俱分立停當然後坐堂照前法選兵約足勾一哨官所管之數又照後開條編次一哨官畢又選一哨官者一將選中兵先儘哨官自定部下哨長㡬名就將㡬名内定第一哨哨長當前立訖餘㡬名且在坐後不許行動又聽前立第一哨長于兵内自舉抽出隊長㡬名又于隊長内定出第一隊長前立餘亦在坐後立將第一隊長令在選中兵中帶愿入隊兵十二名在公座前面横一字立先將隊長用束伍内腰牌紙一張于習藝空内填領隊二字照束伍篇内給與方色隊旗一面連人先送至填營伍處其填營處先給定成營伍無姓名行伍册一本遇送人到將腰牌紙内照營伍填畢又連人牌送與填縣分都圖處照腰牌紙内空處填畢又連人牌送至填年貌疤記處照腰牌紙内空處填畢又連人送至填尺寸筋力處照腰牌紙内空處填畢又送至的當鄉土之官管填所住地名處照腰牌紙内空處填住處地名畢乃將本隊長帶過十二名兵内先擇年力老大一人付以長牌長牌無甚花法只欲有膽有力賴之遮蔽其後兵前進耳次將年少便捷手足未硬一名為藤牌藤牌如前説之謂也次將年力健大老成二人為狼筅狼筅枝簳繁重足以蔽身而壯膽故用法明直易習便于老成手足已硬之人次將有殺氣有精神三十上下長健好漢四人為長鎗手又長鎗之次者二人為短兵長鎗用法多習學非身手眼俱活者不可用此器又專主于刺故選授又貴于精中取精次老實有力能肩負甘為人下者一人充為火兵欲負鍋裹之重性下肯為同類所役一毎定完一人為某器即填于腰牌内習藝空内連人一照先編記隊長之法挨次挨送各所立挨記牌下處處填完一隊畢通令隊長帶赴又一處抄錄腰牌紙内所填格限在册即將一隊兵送于空地立標之所坐聽一第二隊照第一隊法編給挨填完畢又坐如此一哨内各隊皆畢將哨長亦照隊長挨填照束伍篇内給與該方色大旗一面即執於先編過本哨該管㡬隊頭坐定又如此唤過先已發放在坐後立著的第二箇哨長來編出隊長又照一哨之法挨隊如前選編俟一哨官的完了授以約束責令哨長管隊長隊長管兵每隊互相識認亦照束伍篇内腰牌隂面之式刷來將全隊姓名填于式内每名給一張粘在腰牌隂面一自此為始凡行動立止俱照式内鴛鴦次序前後左右恁是如何不許時刻錯亂行立如有一人更换俱連坐治罪换了兵責隊長换了隊長責哨長約在某日闔營可以選完發放到日前来對讀腰牌如此選兵選中即成行伍即有綂束雖生兵烏合今日入彀今日即可鈐束即成軍容即不能更換而制馭分散即在我矣選中一名就得一名實人在行伍中操練若再至通完仍照選兵法分立牌所總對讀腰牌一遍差者换者即便以重法連坐其一二人便要立重信此時重信一立如古人徙木云者以後順手牽羊惟我號令是聽而方可言練也此一節己於練兵有五分工夫矣心之精微盡於此説識者詳之此一篇乃治兵之始初下手工夫百萬之綱領也節目由兹而寓幸勿畧焉敢告同志原束伍夫營陣之法全在編𣲖伍什隊哨之際計算之定若無預於營陣然伍什隊哨之法則或為八陣或九軍七軍十二辰古人各色陣法皆在于編伍時已定一加旌旗立表則雖畎畆之夫十萬之衆一鼓而就列者人見其教成之易而知其功出于編伍者鮮矣故營陣以伍法隊哨為首乃以束伍貫諸篇庶使知次第也今法長牌一面藤牌一面狼筅二把長鎗四枝短兵二件火兵一名為一隊方而為九直之為二伍分而為三才為五花四隊為一哨虛其中哨長居之四哨為一官虛其中鳥銃火器哨官居之每前後左右四哨為一總把總居之設與五方旗一副髙招一副巡視旗四件掌號一名金鼔十二名初謂銃手自裝自㸃放不惟倉卒之際遲延且火繩照管不及每將火藥燒發常致營中自亂且一手托銃一手㸃火㸃畢且托之即不中矣令砲手另聚為伍四人給砲四管或專用一人擎一人㸃放二人專管裝藥抽换其㸃火一人兼傳遞庶無他失可以成功但此法只可施于城守若臨陣不無人路錯亂引軍奪氣邊銃可用此法鳥銃還是單人自放又便一器械長牌手腰刀一口藤牌手腰刀一口火頭每名給銅鍋一口夾鎗棍一根行即負五人預備攻圍乾糧止即專司炊㸑每短兵叉頭各帯火箭六枝其挨牌藤牌上各帶蒺藜十串每串六箇接連式開于後每小隊輪帶拒馬六副輪帶布城一堵銃手每名裝藥筒皮袋一箇布油單一張錫鼈一箇盛線藥毎隊或杴或钁一把該添或銃手或毒弩手或精健能行或大刀收入中軍專備衝鋒探報等項之用前開該用中軍把總是也此兵并不帶拒馬蒺藜等項每弓一把長箭一百枝邊箭一百枝毎弩一張弩箭一百枝弩藥一瓶毎哨大銃三門不用木馬止用新製極便合口大鉛子每三門如式送子一根鐵錘一把中軍九門中哨内火箭一百匣匣如式箭如新製又如千里雷等銃係中軍巧法相機出竒所用此不載以上圖式用法俱開後册一雜流匠役每一營火藥線匠一名木匠一名鐵匠一名大銃手三名各帯全副器具每把總哱囉一名喇叭一名號笛一名鼓四名鑼手一名摔鈸一名中軍臺上下營吹鼓手共三十八名醫士二名醫獸一名精占筮者驗留裁縫二名弓匠二名箭匠五名火藥匠十名大銃手一隊三十名一旗幟每伍小旗一面各隨方色每隊中旗一面每哨官藍旗一面門旗三面毎總藍旗四面五方旗五面髙招五方五面每桿燈一箇中軍五方旗三副五方招十面藍旗一十二面門旗一十面背上小招督戰軍令旗十二面清道旗二面金皷二面賞號官二員坐纛一面一夜營應備中軍大將旗鼔上各黄油紙鐵絲燈一盞俱粗四寸長一尺五寸五方旗十面十盞吹鼔手三十八名三十八盞角旗八面八盞將纛一面上燈四盞凡各雜流官生人等每起頭目各帶燈一盞粗同但長止用六寸低執隨身前總哨旗上紅油紙鐵絲燈一箇髙招一箇俱圓一尺五寸每一隊旗上一箇色同圓八寸左總同前總數但用藍油紙長二尺粗五寸隊燈長一尺粗同右總同前總數但用白油紙方形一尺二寸隊燈八寸後總同前總數但用黑油紙匾形髙一尺二寸横二尺匾四寸隊燈髙八寸横一尺六寸匾四寸中總塘報等燈俱圓而黄小止用八寸一凡各毎燈一盞用黑油布四層罩蓋一箇以備一時遮隱使寸明不露或明營暗徙或暗營倏明為莫測之巧也紀效新書卷一
