  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0019_WYG_015-1a, image: WYG0728/WYG0728-0612a.png}
body:
  text: 紀效新書卷十五明戚繼光撰布城諸器圖說篇第十五夫南方田水界地雨濕不可用車我兵卒然遇敵緩急無家可依賊皆洞見知我無拒禦之備是敢盡力向我一遇奔潰全軍退走其布城之法不惟緩急可恃且足張疑使賊忽然舉目無中生有眼前皆是遮映造次便不得知我立此主何意且不得便知我布裏虛實外既立有拒馬蒺藜以為禦而復有布城遮映至有誤為真城者緩急之間便不敢輕易近我營壘如果賊人瞭料其情我已備之久矣鳥銃俱向城而伏賊如來敵必須先取去我蒺藜拒馬攻取之間彼外不能視內而我可由布城視外便打銃戳鎗射弩無不便宜一絲之限足類金湯如賊亦打銃我則將各兵綿被再搭一牀於布城上又可禦鉛子矣計法每一隊雙立為鴛鴦陳該平去第二小隊一丈五尺用布雙層高四尺長一丈五尺每五尺為一柱共用柱四根用布五幅上用淡色畫界磚石之形一器具除武經總要圖象之所有人人可能者不備外今將武經總要所無及武經之所有而今不知用者並開於後右鼓架相似三根一束長五尺徑各一寸五分上用屈鐵頭下用鐵鑽每一架立地二尺五寸一小隊相接該六架隨在取大木壓其中每一小尺一箇每一步六箇為一繩俱用繩串入蒺藜心中而出每一小隊前面下五層共計十五根俱牌上掛帶以行此物有數法或用皮鞔或用輕木而外加以竹用釘者最利急則擲之地下可以當釘板阻險其符法乃兵家厭昧之術激我士心而疑敵者也非真以此為恃後人毋惑之而為所誤凡兵所帶繩串蒺藜掛於此牌向外釘上以行用時取下鋪地圓藤牌雖為擊殺之器而不能立束部伍凡賴之以束整部伍齊進止遮人衆壯士氣進如堵墻退如風雨者惟有此牌之功為大為可用奈只可以遮隔刀鎗而不能隔鉛子尚俟天生豪傑之才更為之其法長五尺橫闊三尺以木作架高七尺闊六尺以舊綿絮被掛上張陳前堵鉛彈釘板可攔路軟壁無他奇異用人所蓋綿被覆於木格上耳固一時從便之法然不若所製剛柔牌四五十步之外可以遮銜鉛子屢試無失然近至三十步亦要打透但鉛子銃必是遠放定無一二十步可放之事今開法於後不立圖者祕之也其法以輕木為長桄中用一檔牌身如木牌大先用生牛皮二層釘之皮裏用好蠶綿三斤用布裝為一袋貼牛皮之裏用分水薄綿紙每二張鬆鬆團為一毬挨行擺之又用蠶綿五斤裝布袋一幅蓋之四邊竹釘定固通用灰漆四明裏面布處用油厚塗使不入水重可十五斤計費五兩以上只苦於價重而官司不能辦耳除此之外或以鐵為鋒或云用鵝毛人髮或用密紙或用皮漆或用竹木而尖其脊余曾極其智慮博采萬口之說盡以製造之方所費不知幾百金而竟皆不能遮銜鉛子未有勝此法者也以上通用灰布漆油最忌水入坐臥結實竹籖四寸長五分闊上書隊甲兵勇親臨官押油飾掛頸靜炮響各銜枚肅靜代圓枚而用更可查考此筒用猫竹去皮庶不裂長一尺上用木蓋下用原節為底貯蒺藜懸之於腰用時手提撒之下地均勻且速而不粘除此皆乖插蒺藜不利用矣用一握竹長五尺繩繫頭作兜貯石搖勢一擲而去守城宜用近來賊用長竹先打而行則機發於人足之先弩又無用今當多用如百弩連成數丈其機只在向我處弩盡頭下之俟彼走進踰弩將盡處就長竿先發其機則不能退出數丈矣又當分作三四箇機渠能打發其一機即謂盡發矣而不意又有未發之機也尤妙若三五弩而擺丈餘地則無用且未必矢矢俱准著人身恰得正好也用大小木為每扇闊五尺高堞五尺衮木二道贅大竹釘浮於拴上約可二人負之而行輕重適均在城上則立在垜口防夜襲登在兵中可肩而下營立成營盤放鳥銃法式一放銃之法先將藥預裝各小竹桶內約銃口可容幾錢鉛子一枚即每桶裝藥幾錢藥多則鉛化藥少則子無力先裝藥入銃用搠杖送實方下鉛子一枚又搠杖送下至藥際將火門取開用另裝細火藥傾入鳥銃火門內向上振搖藥入線門將火門閉之以火繩安入龍頭前手托銃架中腰後手開火門即拿銃架後尾人面妥架尾之上用一隻眼看後照星對前照星前照星對所打之人用右手大食指撥鬼向後鬼入龍頭落在火門藥燃銃響鳥銃之中准在於腹長而直火藥之不奪手在於前手拿在銃腹照放之直在於兩手俱托執銃身而無㸃火之誤鉛子之利在於合藥之方其神機銃用木馬繁而多誤勢難再發邊銃手執後尾其重在前一手㸃火眼不能照皆不及此銃之妙而速也一製合鳥銃藥方硝一兩熿一錢四分柳炭一錢八分通共硝四十兩熿五兩六錢柳炭七兩二錢用水二鍾舂得絶細為妙祕法先將硝熿炭各研為末照數兌合一處用水二碗下在木桕木杵舂之不用石樁者恐有火也每一桕舂可萬杵若舂乾加水一碗又舂以細為度舂之半乾取日晒打碎成豆粒大塊此藥之妙只多舂數萬杵也大端如製合好墨法相類若添水舂至十數次者則將一撮堆於紙上用火燃之藥去而紙不傷如此者不敢入銃矣只將人手心擎藥二錢燃之而手心不熱即可入銃但燃過有黑星白㸃與手心中燒熱者即不佳又當再加水樁之如式而止一造鳥銃之法後門有螺絲轉者此銃腹長放過後內常作濕二三日要洗一次用搠杖展水布一方醮水入洗之如鉛子在內或尅火門等項取開後門絲轉以便修整最為易便一行營之內鳥銃雖速准而力小難禦大隊難守險阻難張威武佛狼機又太重難於扛隨今以臆創一器名為賽貢銃既無下木馬延遲之艱又不坐後其鉛子猶勝佛狼機之大其聲勢可比發貢其速即可比鳥銃每五百人之中用以五六門以備守路截險甚妙一銃式銃長三小尺內口約容半斤鉛子藥在粗腹不可過鉛子送至腹口方好即如此平臥地下隨其逺近加墊頭高並不用木馬等類此器之利者亦以項長而鉛子合口故也後有連子銃銃鎗皆繁巧放銃時多誤難以屢中無虞聊亦載之以備兵家之一法也銃如鳥銃但藥盡處用一孔上安一鐵筒入鉛子數枚門定口一箇銃放去一箇子又落入其法以藥裝入一節節以厚褙紙錢一箇中穿藥線一寸送入銃內又裝一箇藥入築實又間以穿藥線紙錢如此裝至鉛子鐵管止一子母炮此用驚營或夜間遠遠放入賊壘少停於賊壘中銃發無制之兵烏合之衆奪氣之寇勢必驚惶我得乘之此器最妙一裝放子母炮法此炮用木信雕成螺絲轉形為渠以藥線隨渠纏足下露線一節在底上露出信之上用褙紙信外卷緊與子銃口合乃將好藥入瓶八分將信送入口即將瓶覆向下搖搖按入其信若仰瓶裝信則信底有藥放時藥催信出而瓶不破響惟覆裝其信則將信務入到底庶底下無藥藥在周圍信線燃入藥乃作破子瓶其放時先用木馬將大銃裝畢以瓶入上大口先㸃瓶線燃入木信不見即㸃母炮線打去若瓶線㸃早母線太長則瓶不出口而響矣若㸃瓶線太遲未及燃入打去則閃風而滅矣又有一法共拴一線居中㸃火終是不齊還是兩㸃為妙此乃天下通有利器今所以重圖者舊製之未盡精微也其妙處要母銃管長長則直而利遠子銃在腹中要兩口對合則火氣不泄子銃後方用半笋轉入者每放時多擊出子銃數丈傷人必用鐵閂者佳其妙處在今添出前後二照星後柄稍從低庶不礙托面以目照對其准在放銃之人用一目眇看後照星孔中對前照星前照星孔中對所打之物又子銃內用木馬後下鉛子茍子馬俱大則難出出則力大要坐後而人力不能架之若子小則出口鬆而無力歪斜難准今法止用鉛子預將鉛子照子銃合口微大一分製就用時入藥之後即以子下口用凹心鐵送桿打下入口一寸即入母銃放之此法既省下木馬煩難之功又出口最易而且鉛子合母銃之口緊激直利便速成功凡鑄銃之法子銃口大則子難出要破母銃母銃口大而子銃口小則出子無力且歪務要子母二銃之口圓徑分毫不差乃為精器也切記切記夫火箭亦水陸利器其功不在鳥銃下但造者無法放者無法人鮮知此器之利也大端造法有二或造成用鑽鑽線眼或用鐵桿打成自然線眼但鑽者不如打成者妙鑽易而打成費手故匠人多不肯用打成之法其肯綮全係於線眼眼正則出之直不正則出必斜眼太深則後門泄火眼太淺則出而無力定要落地每箇以五寸長言之眼須四寸深桿要直而去頸二寸稱平翎要徑羽長而高褙筒用礬紙間以油紙則不走硝可留二年此物最不耐久收也一炮法武經雖載而獨行炮單架者甚明鮮有人能悟之故重開明其勢此為守城第一器也既省火藥之費又有不乏之資紀效新書卷十五
