body:
  text: 紀效新書卷八明戚繼光撰操練營陳旗鼓篇第八號令既習刑賞俱明于是列於場肆而教以坐作進退之法為營陳之制以施于用故以操練篇為第八一發放候升帳喊堂畢牙旗開中軍官禀升旗禀訖即放炮一箇擂鼓升旗待衆聲跡將定又禀放靜炮禀訖放炮三箇三軍肅靜敢有喧譁者軍法施行又禀稱吹號笛聚官旗聼發放俟官旗到齊立定金止中軍官叫官旗上來兩邊齊應一聲自卑而尊由隊長從下擺起務要行次疏直齊均各官旗依次跪下中軍官執發放牌高聲發放云官旗聼著耳聼金鼓目視旌旗步間進退手習擊刺萬人一心惟將令是聼違犯的軍法不饒每一句衆應一聲分付畢若有别項講諭各靜聼主將逐一親說記定依次分付自尊而卑起立分列如前中軍官𫝊令官旗下地方衆應一聲聼大吹打官旗由原路散回信地聼各把總吹號笛哨官哨隊長俱聼把總處照臺上發放但先一句云奉臺上號令如有分付一體字字諭之仍照臺上規矩大吹打散回信地又哨隊長各到本管哨官處再行宣說但第一句云奉本總號令畢歸隊隊長率兵通聼哨長發放但第一句云奉本哨號令畢又兵聼隊長𫝊說約一刻掌下營號頭即各肅靜聼下營一中軍請鈞㫖下營禀訖中軍即撥下地方巡視人役每哨二名共十名旗上明書某哨巡視字樣俱赴臺下禀請下地方藍旗聼發放掌號官發放凡呐喊不齊行陳錯亂喧譁違令臨陳退縮拿送處治分付訖督戰旗牌每總一面五面付官懸牌執旗禀稱執旗牌下地方督陳旗牌上馬各巡視旗從之由發放路各歸營哨中軍吹哱囉各起身一蕩喇叭必警二蕩必齊再吹哱囉中軍擺金鼓旗幟掌旗者即將原列兩行旗取五方一副上將臺二副擺定兩邊官兵聼㸃鼓于臺前如路廣則兩哨四隊平行如路狹則每哨挨隊依鴛鴦陳法照圖行至極前俱層層立定金響鼓止以下至收為大營句止共八條其八圖此每每臨陳對敵所用者乃實效非飾觀視之筌蹄也數年屢戰一切號令行伍俱如圖欵毫不更易是以每戰必全捷而我兵不損及至困攻賊雖竭力以刀石擲敵而我兵不為所傷者此鴛鴦陳牌筅鎗􅀈居次之功也須臨陳觀之便得妙處肯綮借或場操之際肯有親入行伍內一試之者亦自知其利不可以口舌楮筆載也今將初出圖令開後次第之俟定又㸃鼓㸃旗前營正兵即由正路以當賊之頭左營即由左取路以出賊之左右營即由右取路以當賊之右俱依大鴛鴦陳勢單隊雙行如有五營則以後哨急出伏於左右因地勢山林而從便相機如欲俟賊來迎我我則伏兵出於前三枝大兵之前里許之地如我欲徑殺入賊中不待賊動則伏兵即于我所進左右二枝大兵之後與交鋒之地相去不過半里伏之此時料賊已相見不必密行也候前正兵將近賊一里之地急吹單擺開喇叭將鼓急㸃前營正兵即大鴛鴦陳平平一字列開以前哨為第一層後哨為第二層左哨為左翼右哨為右翼左營竒兵以前哨出左路抄賊為正兵後哨為二層接應左哨為左翼右哨為右翼其右營竒兵亦照前營兵分于右通每一層為平一字擺開如路狹則擺大鴛鴦陳如路寬則自大鴛鴦陳又分擺為三才陳俱在臨時所變此皆以場操兼對敵之實事言也若專在場操其伏兵一半出大兵之前一半在大兵之後庶二者俱習矣但如伏兵在兵之前必須賊未見時先事遣發亦必賊勢迎頭而來者乃可也然此伏收功最易但伏之甚難非上等好漢齊心齊力不可也須賊過我伏來方聼我號令而出不大成則大敗惟有隨兵同出遇藏身之處從便伏于兵後一著此最穩當雖不大得亦不大失但此伏所以防前兵少却為第一功除此無所用其力如此攻伏恁是如何賊不可測何則有前行大兵遮護之耳其中軍兵一面在大兵後二三里之內據險劄老營如此擺陳須速其定伏兵俱伏已畢候近賊百步之內中軍放銃一箇吹長聲喇叭鳥銃手在前打銃每長聲喇叭一聲打放一層只至擂鼓而止如喇叭急吹長聲連連不止是要鳥銃手一齊放了也不必抽放又近賊五十步外放起火一枝各射手兵放箭放弩放火箭畢吹天鵝聲喇叭擂鼓各兵奮勇徑奔賊鋒再不許時刻遲疑恁是如何厮殺不許亂了鴛鴦陳隨離隨合務要牢記其平日所習陳法牌筅鎗刀之法用時都如平日爭忿厮打一般不慌不忙殺進一層又殺一層殺死倭賊恁從後兵斬級當前者只管殺去恁賊擲來金銀只是厮殺再不須顧第一層戰酣擂鼓少緩又擂鼓第二層急急衝過前層接戰前層少整隊伍鼓又少緩又擂鼓第一層又衝過第二層之前接戰原二層少整隊伍兩翼竒兵一體間層依令進戰整隊與正兵同待左右俱合之際扮賊奔走屯巢之象鼓又少緩再次擺隊伍喇叭各兵即將賊所奔入之巢或上山林之內即時四面各整鴛鴦大隊圍住每遇門路處以厚兵一哨官者當之緊于門路要口鴛鴦陳列定以備併力衝出殺入不許輕動擅進恐中賊伏及或一人有失誤事不小賊之鋭鋒死鬭皆在此處但以守定為功其非門路之處各營哨分內信地之兵聼即設計出竒從便攀登以入敵戰但責其取勝而已大捷既畢據報無警各兵照舊困攻聼中軍差親兵入圍內搜報平安聼摔鈸響各于腳下收成大隊再聼摔鈸響各哨為一聚各營為一大聚俱隨五方各該大旗下立定俱仍照原出戰大陳之規分前後層左右翼聼鳴金一聲各前一層退出間隊退在後層之後連鳴金二聲齊喝一聲立定又聼鳴金一聲又後一層不退之兵間隊退過已退兵之後又鳴金二聲齊喝一聲立定如此間隊依金退至中軍大營放炮三箇呐喊三聲鳴金大吹打得勝鼓各兵挨次看旗頭收回作大四疊此五營出陳之說也若止四營則以一營為正二營為左右以第四營一半設伏一半劄老營若止三營則以一營為正兵一營分為左右一營之半為伏兵一半為老營若兵止二營則以一營中一半為正兵一半分為左右一營一半為伏兵一半為老營若止一營則以各哨分之雖是一箇人亦可如圖操習及如圖臨陳也刻舟求劒者豈足以語此圍攻之法不可執一也如賊勢大敗賊少我衆所圍之處或山林人家又復狹窄方可四面合圍必使一倪不返如賊氣方盛我少賊衆或所圍之處散濶而我兵分守不足必缺生路一面分兵于去圍十里之外必遁之路伏之收畢吹打止鳴鑼坐地休息金鳴鑼止打金邊發塘報候塘報搖黃旗知有賊各兵聼吹哱囉起身先㸃後營旗不㸃鼓後營兵分為二枝照前次擺開圖設伏畢次㸃鼓㸃旗發前營兵為正兵左營為左翼右營為右翼中軍在後據險劄老營通照前次擺開之圖立定聼吹擺隊伍喇叭擺為大鴛鴦陳金鳴喇叭止又聼吹單擺開喇叭擺成三才陳金鳴喇叭止鳥銃手照前陳號令放炮畢中軍擂鼓鳴天鵝聲喇叭呐喊各兵一擁飛身追戰第二層隨上鼓少緩又急擂鼓第二層又飛身衝出前層之前衝戰前層少整隊伍右營等兵通照前陳內號令一體操戰候二層俱交鋒之初前伏兵一齊擁出賊之後至左右兵合戰得勝聼鳴金戰止摔鈸響各整在所立信地此時在兵後左右伏兵照舊伏不許動再聼連鳴金三聲退回退法俱照前陳圖號退至中軍之前押陳大旗巡視旗急搖中軍放銃一箇原設在陳後左右伏兵與中軍正兵先將鳥銃一通盡放擂鼓吹天鵝聲喇叭合正伏之兵一齊呐喊左右伏兵急進中軍退回正等兵俱一齊轉身便衝進其前與賊交鋒混戰必勝而後已摔鈸響收整隊伍又摔鈸響各押陳大旗收回先立為長一字陳之表比先出一字稍加稀濶左右兩營橫離一百步鳴金大吹打各營照旗收回仍為長一字陳立定金止中軍禀對壘安大方營禀訖照後大方營圖號施行一發兵出列之圖一收兵退回之圖照前初出長一字圖俱與前出戰收退之圖相同兹不重出當取法于前圖云夫南方山水林翳地勢最狹惟有前二陳用無不宜此因地措形也何則善用兵者因敵情轉化其法已云然矣而不知善操習者亦因兵情轉化豈有一定之習哉善用形者亦因地形措戰豈有一定之陳哉况兵列既長緩急之變賊勢叵測茍或遇出於此格之外偶有警急豈能候中軍號令若遇未及照令施行之中忽有前變則前營把總即自主號令先以備戰左營右營各聼當前把總之號即如中軍號令一般則後營伏兵即當于前哨之後左右或遇山渠或林木人家或街巷灣曲可以潜躲身形之處偃旗斂跡銜枚充為伏兵以備前哨萬一却回俟其走盡追過我伏來聼在後老營兵炮響即便矢起截衝賊中或出賊之後如此必轉以為功而前伏不及設亦不必設矣其劄老營䇿應兵如賊徒戰進前哨兵來俟賊過伏兵所在即便衝出後營兵一面在後太逺處據險為家阻拒扼塞豎立營壁管三營火兵做飯備守一戰勝追賊防伏之法夫倭性人自為戰善於抄出我後及雖大敗隨奔隨伏甚至一二人經過尺木斗壑亦藏之往往墮其計中辛酉之役一月十捷我兵損不及六七人議者謂非兵之巧乃賊之拙此倭不如别倭之有伏也殊不知將前法已曽教熟于平時故如花街之捷戰追四十里而保全勝者非賊之無伏我有搜守之法而伏無所用也其法如賊徒一戰而敗賊遂奔北我兵追上凡遇林木人家過溪轉角之處每量林木屋垣灣曲大小即留一隊或一哨守其必出之口而他兵一面徑跑追上每遇一處即留一處又或村落極大者即通行圍止聼人進搜無賊高聲為號又復前追其麥田茂草之地又皆可伏之所我兵每一哨內即留一隊分投下路星散麥田草中搜打喊叫一面正兵徑追故每戰多於麥田中搜獲生擒此非避我者正賊之伏也一操法以木牌上書麥田村屋分别大小等字恁聼一人以便插于教場以灰畫為委委曲曲羊腸大路一道擂鼓交鋒既勝追賊照前說依圖分往下路于所立木牌處搜防今列圖于後一中軍大戰全捷對壘安大方營打金邊五方旗幟先出立表執旗立表之人執五方旗者先于中軍四直各數行足立定各四角表旗自門旗平看亦行步如數立定為四角之表各須聼主將預計如每鴛鴦一隊該去一丈計之每面約若干隊為若干步高招又少折一半立為子層前營兵即為前面左營即為左面右營即為右面後營即為後面一吹擺隊伍喇叭兵照各方旗色依本旗望表蟻附下營各哨為一簇團聚門旗兩邊俟人定聼吹長聲單擺開喇叭照方營圖撒開依鴛鴦整陳立定司杴钁者作掘塹勢立拒馬者立拒馬下蒺藜者作安蒺藜勢鑼鳴俱坐豎黃旗擂鼓發火兵樵汲鼓三通發出閉營門吹號笛官旗發放㑹議事俱照臺上發放號令施行候各到地方掌號吹長聲哱囉全營起身擎鎗作勢方伏黃旗收火兵進營起火一枝各營舉火炊食畢即隨報有賊之處看豎何旗如豎紅旗則前面備戰豎黑旗後面備戰豎藍旗左面備戰豎白旗右面備戰旗既豎聼哱囉一蕩起身收執器械㸃鼓鳴銃先行在前離本營一百小步立定其該營之兵前哨出在鳥銃後每哨各隊平列為一層二哨在左三哨在右四哨在後照圖擺定其中軍親兵之類一字擺在出戰兵之後以補該面方營之缺聼吹擺隊伍喇叭前哨踈擺大鴛鴦陳在前為正兵左哨出左邊右哨出右邊後哨攢上前與前哨相近二十步為次層接戰兵其左右兩翼兵務與中間正兵相去各隔一哨之地切不許擠密相聨各以一哨二哨為抄賊竒兵三哨四哨徑在大兵之前半里外左右或山或險或林木人家或溝渠但可遮藏形跡之處俱各銜枚偃旗卧定為伏兵其交鋒之法聼中軍放炮一箇吹長聲喇叭一聲銃手放炮一層吹過五次喇叭放過五次炮盡出戰如有令分付若喇叭吹長聲緊吹數聲不止則凡在炮手一齊單列盡數放畢㸃鼓前哨慢行出鳥銃外擂鼓吹天鵝聲喇叭呐喊交鋒任是如何不許離亂鴛鴦陳法一隊一陳任其亂殺亂砍不許與牌手相離一聞金響即復原隊如賊不退尚在交鋒金不鳴中軍擂鼓忽止又㸃鼓則該二層間隊出約將到擂鼓吹天鵝聲急出前層之前接戰兩翼抄賊竒兵相夾而進如賊敗走原擂之鼓聲聞不歇則當交鋒之層只顧追殺上前二層緊隨擂鼓少止再擂又是二層間出只顧整隊間出上前追殺但聞鳴金三聲火速腳下立定聼摔鈸響速收整原隊鳴金一下第一層退至最後層兵之後聼連鳴金二聲復擎鎗回頭作勢齊喝一聲立定又如此鳴金二層又退回已退後層之後又鳴金二聲又復擎鎗回頭作勢齊喝一聲立定再鳴金又該已退在前之兵又退又止如此依聼金令輪退只至鳥銃之後此時賊若追我過伏兵來中軍即放大銃三箇兩邊伏兵一齊擁出打銃兵皆橫奔冲賊務出死力抵敵正面兵一齊回頭擁上四面合攻混戰老營發兵助勢此時伏兵已起若已退正兵而不即回頭拚命䇿應者全隊如禁令條約施行大得勝金響三聲各照前出退法退回原劄陳之地立定金止聼報無賊摔鈸響收隊再摔鈸響收成大隊前層不動後層少退留左右二哨之空左右二哨俱各腳下立定再聼摔鈸響左右二哨各馳回原空立定鳴金大吹打鳥銃先回進營門即轉身向前伏定防前有賊來兵哨挨次徑歸原營每哨一聚畢喇叭吹單擺開仍擺方營餘三面之營皆是一般號令出戰凡營中無故放炮是欲更變號令炮響後各營看中軍豎何色旗何營聼備出戰通戰收已畢鑼鳴俱坐中軍禀收大營起營吹長聲哱囉各起身摔鈸響收成大哨再摔鈸響五方旗招回中軍各兵聼中軍旗招㸃各營照旗方向俱歸旗下為一字而前擺開乃為四疊聼令收營凡戰但係正兵俱聼喇叭次數或擺鴛鴦陳或擺三才陳隨號無定其兩翼伏兵定要擺作三才决不用鴛鴦陳蓋伏兵要突出必是奔跑鴛鴦陳人衆跑逺易亂故只用三才陳人少易出應急為便一交鋒之法兵在各伍牌後遮嚴緩步前行執牌在前只管低頭前進筅鎗伸出牌之兩邊身出牌之後緊護牌而進聼擂鼓吹天鵝聲喇叭交戰執牌者專以前進為務不許出頭看賊伍下恃賴牌遮其身只以筅鎗出牌之前戳殺為務如不上前隊長牌兵之責如隊長牌兵被害伍下償命其兩翼之兵先大張其勢望外開行俟將戰急於賊之兩邊各令一半自外圍戳而來各令一半伏住俟賊到正面兵俱將牌立定不動兩竒兵急合賊必分兵迎我兩來竒兵俟賊四顧奪氣正面兵即擁牌夾戰如勝負未分前力已竭又即㸃鼓第二層由前層空內間出如圖接應對敵聞金得勝而止依退法退回架梁兵各帶小旗一面捲訖知賊已無别伏方才打得勝回營一定立交鋒之圖一退兵之圖一伏兵出戰回兵䇿應之圖以上俱戰前操長營內已詳兹照前圖施行此不重出一收營法即從方營收成四疊放銃三箇呐喊三聲一齊收至將臺鳴鑼過隊各回原劄兩行信地金響鑼止又慢鳴鑼三聲散中軍歸列鳴鑼兵士坐息如出戰在野收回則放銃呐喊畢照行營隨地形變幾路收回以上操戰法似為定局或者曰所謂刻舟求劒也倘兵非四營將焉用此殊不知一隊一哨皆可操當照後演之式不拘人多少今將零哨一哨起至合四營上常操分合之妙圖說另具于後一挨隊操演自一隊起至四隊畢又合一哨操四哨畢合一營操此以下操法號令俱附各圖右如此雖十人亦可用戰法亦有竒正不過一頭兩翼一尾中軍為心是謂握竒心運四肢當敵者為頭迎鋒尾即繼後與頭更畨間出不窮兩翼隨之自逺而近迎合于前但遇敵處即為頭為正兵但在左右即為翼為抄賊竒兵但在後即為尾為䇿應兵其金鼓號令雖操五人十人由一隊以至一營由一營以至十萬皆同一操法一隊前來立定鑼鳴坐地聼吹長聲單哱囉各起身執器械聼吹擺隊伍喇叭整隊鴛鴦隊擺開再聼吹單擺開喇叭即變如後圖三才陳㸃鼓前行擂鼓吹天鵝聲喇叭呐喊交戰五人為正兵各三人為右左翼金響三聲立定鳴金一聲面前退回連鳴金三聲即向前齊喝一聲立定摔鈸響仍收鴛鴦隊打得勝鼓回在教場空地立定鳴鑼坐地休息如是又㸃哨長旗第二隊照前習戰二隊畢又㸃哨長旗第三隊習戰畢又㸃哨長旗第四隊習戰號令皆同第一隊習戰例四隊俱完是一哨完一四隊為一哨操完聼哨官㸃旗吹哱囉以上每操完的一哨俱起聼㸃鼓整鴛鴦隊一隊單行二隊三隊並行四隊單行立定鳴鑼坐息聼塘報在前搖旗報有賊至聼吹哱囉起身聼吹擺隊伍喇叭即整鴛鴦陳二隊在左者左出去正隊缺十小步如野地不拘但以進退便利為界右者右出聼再吹單擺開喇叭即分三才陳如不再吹單擺開喇叭是不分三才陳只以鴛鴦陳聼號交鋒但以吹喇叭聲為准如擺三才陳已定聼㸃鼓頭層一隊慢行四隊在後跟上聼擂鼓吹天鵝聲呐喊第一隊交鋒任是如何厮殺不許亂了行陳又㸃鼓在後第四隊由一隊空中間出一隊之前交鋒如此相輪間出無窮右左二翼二隊三隊照居中正兵一層進一體進一次只進至兩翼抄抱相合在正兵之前止聼鳴金三聲各收原隊再鳴金一聲在前層退過在後一層兩翼一體各退原路連鳴金三聲齊喝一聲立定又聼鳴金一聲前層又退退至原地摔鈸響收成鴛鴦陳再摔鈸響收成原哨立定是一面操畢如後面塘報報有賊即以四隊為正兵一隊為二層間出二隊為右翼三隊為左翼戰法收法俱同前例如操畢左面報有警即以二隊為正兵三隊為第二層四隊為左翼一隊為右翼戰法收法號令俱同前例如右面報有賊即以三隊為正兵二隊為第二層一隊為左翼四隊為右翼戰法收法號令俱同前例哨長居中調度為中軍一哨操畢回空地鳴鑼坐息又聼二哨三哨四哨各輪照一哨之法操畢又聼回空地鳴鑼坐息如此四哨俱完又鳴金邊探賊待報警即聼本總㸃本哨官方色相同之旗即各聼吹長聲哱囉四哨通起身收拾器具鳴金邊發塘報四哨旗即前至戰地立表每隊有三步長則左右旗各退第一哨之旗後十二步左右平立第四哨旗在後之中又退左右旗十二步立定㸃鼓先鳥銃次前哨挨次各就旗下立定聼㸃鼓則每哨四隊通攢到旗下平列一字聼吹擺隊伍喇叭一哨鴛鴦陳擺開相去三大步如不再吹單擺開喇叭是地形廣濶就用鴛鴦陳對敵如再吹單擺喇叭是地險窄要仍擺三才陳對敵四哨亦照一哨擺作第二層聼令間出二哨即由左面逺離正兵或三十二步或不拘只相地形之便或旁抄小路但不許太逺聲勢不相救應以一隊二隊徑出旁路抄裹賊後二隊四隊即於出正兵三十步之前不拘逺近隨其山地形勢可以隱身之處偃旗息鼓銜枚按伏以為伏兵三哨亦照二哨之法出正兵之右亦一體以一隊二隊比照二哨抄賊以三隊四隊比照二哨設伏若遇地形偏斜止有一邊可以伏裹臨時聼本哨便宜分布若一邊可伏一邊可抄則聼各哨之便可抄賊者盡數抄賊可埋伏者通哨埋伏該總內中軍等兵并不操之哨急帶一哨官者在五十步後據險一字擺開為老營如此布定寂速為要賊至小百步聼本總放銃一箇每掌號一聲鳥銃放一層連掌號五次五層俱放畢聼㸃鼓一哨緩行出鳥銃前聼擂鼓吹天鵝聲呐喊方才交鋒鼓即少緩又㸃數聲第二層四哨兵急出又擂鼓聼天鵝聲接應間出前層之前交鋒鼓又少緩又㸃第一層又出二層之前擂鼓吹天鵝聲呐喊交鋒場操不拘幾層只管輪聼鼓號喇叭呐喊間空抽進兩翼二哨三哨兵亦照正兵號挨層抄進若臨敵交鋒一層已接只有二層四哨接應二哨三哨抄裹之兵待正兵第二層四哨一合前層共戰則兩翼即來抄裹以奪賊氣以壯兵久戰之膽或正兵佯却誘敵或由正路或由别所任便戰引决不許經由伏兵之處却回誤事俟賊追過伏兵來將近老營兵之時聼放大炮一箇伏兵聞炮左右二哨者兩邊齊呐喊躍出或冲賊腰或出賊後賊必慌忙回顧奔回之兵火速轉身本總聼大擂鼓儘力一擁追殺前去萬勝無差戰畢聼連鳴金三聲即各於腳下立定再聼摔鈸響即各歸原隊哨聼鳴金一聲第一層先間隊退回後層之後聼連鳴金二聲喝一聲立定又鳴金一聲在前之層又退過已退兵之後依前令鳴金喝立如此輪間抽回只至老營原地聼摔鈸響照原單擺開圖立定又聼摔鈸再響照原初出營隊立聼金鼓齊鳴魚貫收還回軍如賊從後來即以四哨為正兵迎鋒二哨一二隊為右翼兵三四隊為右伏兵三哨一二隊為左翼兵三四隊為左伏兵一哨為後哨如賊從左來即以二哨為前哨正兵三哨為後哨䇿應四哨一二隊為左翼兵三四隊為左伏兵一哨一二隊為右翼兵三四隊為右伏兵如賊從右來即以三哨為正兵迎鋒二哨為䇿應一哨一二隊為右翼兵三四隊為左伏兵四哨一二隊為右翼兵三四隊為右伏兵一如在教場前面操完收回原地方立定未及回軍忽報後面有警即以在後之哨為第一層正兵先回之哨為第二層䇿應正行之兵各於腳下鱗次鴛鴦陳轉身立定迎敵在左之哨一哨二哨為左翼三哨四哨為左伏在右之哨一哨二哨為右翼三哨四哨為右伏各照舊法但伏兵即於戰兵第二層之後左右即在陳中設伏不及别尋伏地抄兵急急張兩翼而上不必正兵二層輪進之時方才同二層進此是一總通出之法其出戰收兵按伏出敵號令俱與下方營時一面戰之例并不差更如文依令收回仍立定聼吹轉身喇叭仍轉前面再聼報左面有賊即以左面左哨為第一層正兵右哨為第二層䇿應前哨一哨二哨為右翼三哨四哨為右伏後哨一哨二哨為左翼三哨四哨為左伏對敵收軍一如前面號令先回原地仍聼吹轉身喇叭照前面初出圖立定未及回軍又聼報右面有警即以右面右哨為第一層正兵左哨為第二層間出前哨一哨二哨為左翼三哨四哨為左伏後哨一哨二哨為右翼三哨四哨為右伏對敵收軍一如前面號令所謂無不可為頭無不可為尾無不可為翼無不可為伏庶臨事任從何面有警任從前後左右無不即成營陳隊伍左之左之右之右之無不由之如驅羣羊是也若不如此廣習獨用萬一地窄賊近仍要調過前哨向賊為正兵誤事豈小小哉一總操定即大鳴金鼓照鴛鴦陳行回原劄大營信地依行伍立定鳴鑼坐息聼一總又看將臺何色旗㸃照旗色把總帶兵㸃鼓聼吹哱囉起身赴中軍照先操一總號令布戰抄伏收退之法毫釐不許差錯如此五總通完各仍回信地擺列坐定休息聼中軍號令合營大操俱如一總之法四面報賊隨警調應亦同一總四面之法但因地形而加人數之多耳凡每謂之前後左右各以前後左右之總配之每謂之一二三四哨者則以前後左右所分之哨配之由此而增百萬一法一附寧紹操練生兵陳圖其號令俱如見行並不重注紀效新書卷八
