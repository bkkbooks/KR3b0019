body:
  text: 紀效新書卷九明戚繼光撰出征起程在途行營篇第九一主將先傳令票箭期會訖不拘時分但聞第一蕩喇叭收拾軍裝做飯喫訖點查乾糧一面先將前哨塘報人馬每塘五名各以相望為準不拘遠近每路設二十四塘大約二十餘里以內自人馬聚處通該差塘報一齊令行至一里外或不及但彼此可以相望如視望不真即留住一塘立旗站定别塘再走至僅可望見又留一層只至留到二十四層立完站候聽吹第二蕩喇叭中軍擺清道旗出次領哨把總等官領人馬挨哨出城主將居中軍第三蕩喇叭掌號笛官旗聽發放畢各回哨中軍點鼓如一路行則中軍先點大紅旗一面以前總居前次左總次中總次中軍次右總次後總俟各行開已畢中軍豎高招一竿各部高招俱起如圖一路行兵行則塘報亦行兵止則塘報亦止如前途稍寬中軍行至寬處放炮一箇各於腳下立定聽起火二枝放炮二箇立起高招二竿即如圖聽二路行看點藍旗則左總由左行與前總頭平不動中軍藍旗伏二總旗亦伏中軍又點黑旗後總由左行與右總頭平立定放炮二箇點鼓二路行如路又稍寬中軍放炮一箇各俱腳下立定聽放起火三枝炮三箇中軍豎高招三竿黃旗急點前兩路平開空中一路待中總進入與前左二頭平再放炮三箇點鼓作三路行如路再寬可四路行中軍放炮一箇各即於腳下立定聽中軍放起火四枝炮四箇豎起高招四竿前總不動白旗點動右總入左總之右二頭相平後總入左總之左四頭相平中軍居其後再放炮四箇起火四枝點鼓作四路行如路再寬可五路行中軍放炮一箇各仍立定聽舉起火五枝放炮五箇黃旗點中總入居其中再放炮五箇起火五枝點鼓作擡營而行如五路欲變四三二一路或四三二一路各因道路寬狹變行俱如前層變過圖但聽看中軍既放止炮之後有起火幾枝炮幾箇點某色旗即依數分幾路如遇賊凡四五路行即變方營待敵如一三路行之際即變照急營前總速照一總操法備戰左右後三總即各設伏出翼劄老營分投而作前兵見報如賊不來迎戰止許伏哨劄營以待中軍號令不爾擅便輕易失事照節制圖式施行一前哨有五方旗一副高招一副有事方開見林木開青旗阻水澤開黑旗遇兵馬開白旗山險開黃旗煙火開紅旗過所見之物即捲其高招如道可一路行立一面二路行立二面三路行立三面四路行立四面擡營行立五面後部挨隊遞相傳開一凡塘報哨見賊急則磨紅旗緩則磨黃旗衆則磨青旗少則磨白旗無路可行則磨黑旗一層既磨各層照前一時俱磨一層退至一層如賊不來復又立定如賊再追一層又退一層只退至營前斷不許見賊磨旗之後不論賊之追不追來一齊擁衆徑回如此軍法示衆一如賊自塘馬腰內突出與我兵忽遇不及下營者即下急營我兵即時於所行之地立定近賊者不必抽間隊盡數備敵先銃平列打賊次挨牌短兵出戰其無賊處一面照操撥人應援一面安立釘牌拒馬為一字陳别部應發援兵者或包水港溝渠若賊可望見者止守營不許遣接奇兵恐賊乘之如賊不見之處雖有險隘溝渠正我兵出奇必勝之利亦須相險設智别渡精鋭一二百人繞出不意必可取勝此上策也蓋猝遇賊非伊前鋒則為後殿及或四散搶劫零賊必無大衆惟有制必取勝也一行營該傳金鼓旗號一大將旗鼓行軍擺列清道臨時變戰營圖説一擺列圖另開在後一凡有職人員俱全裝披執軍器軍令牌四面可用四人大門旗十面每面用人二名五方旗十五面神旗五面單擺飛虎旗五面五方擺五行五面一字擺用人十五名角旗十面每面一名五方高招正副十面用人二十名坐纛一面用人五名護纛親兵二十五名押旗令旗二十四面用人二十四名下營即散營內督察監軍金鼓旗四面用人四名金鼓二副鉦二摔鈸二哱囉四喇叭四鼓十二笛二板二細樂八共用吹鼓手三十八名每五方旗高招一面後護旗各精兵五名共十層用兵五十名將馬前令牌三面官三員長短兵每排五名共五層通一隊二十五名馬後令字小旗牌背招一十二面用馬十二匹親信膽勇員役執之每四人一層分三層專聽督遣密令押後兵二十五名各用長短器一細近路如線則每五人以中一人前後四人分二層各去一步使不渾别層之意前後層各十步一路寬遠則每層照單擺列每前後各去十五步一遇賊報正行間中軍聞報放起火一枝炮響一聲五方大旗內黃旗即隨主將踏定戰地豎起前後旗號俱攢來黃旗下四方分出立表每方門旗以下旗招護兵等役俱隨各旗列方其本方旗居門旗之中招居方旗之後招高於方旗方旗高於門旗金甲旗並金鼓旗領金鼓居將之左右列前兵一隊居將前令字招旗居將後専聽指麾督兵戰殺後親兵一隊兩分列於金鼓之外紀效新書卷九
