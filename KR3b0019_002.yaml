front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0019_WYG_002-1a, image: WYG0728/WYG0728-0514a.png}
body:
  text: 紀效新書卷二明戚繼光撰竊觀古今名將用兵未有無節制號令不用金鼓旗幡而浪戰百勝者但今新集生兵春汛逼近一切戰陳法令若逐次教來何時是熟今時緊要必不可緩各便宜簡明號令合行刊給各於長夜每隊相聚一處識字者自讀不識字者就聽本隊識字之人教誦解説務要記熟凡操練對敵決是字字依行各讀記之後聽本府點背若一條不記打一板若各兵有犯小過該責打之事能背一條者免打一板臨陳軍法不在此例緊要操敵號令簡明條欵篇第二鬬衆如鬬寡形名是也故萬人一心形名之效茍士不悉吾令而徒以手足為強者又其次也教挺之夫可鬬名藝形名定也束伍既明即當練習吾令故以號令篇第二凡你們的耳只聽金鼓眼只看旗幟夜看髙招雙燈如某色旗豎起點動便是某營兵收拾聽候號頭行營出戰不許聽人口説的言語擅起擅動若旗幟金鼓不動就是主將口説要如何也不許依從就是天神來口説要如何也不許依從只是一味看旗鼓號令兵看各營把總的把總看中軍的如擂鼓該進就是前面有水有火若擂鼓不住便往水裏火裏也要前去如鳴金該退就是前面有金山銀山若金鳴不止也要依令退回肯是這等大家共作一箇眼共作一箇耳共作一箇心有何賊不可殺何功不可立凡掌號笛即是吹鎖呐是要聚官哨隊長來分付軍中事務凡正行之間放銃一箇就是要更變號令即立定看聽有何旗豎有何令再行凡歇處吹喇叭一蕩火兵即做飯衆人收拾吹喇叭第二蕩各兵吃飯吹喇叭第三蕩各兵出赴信地劄營候主將到發放施行凡喇叭吹天鵝聲是要各兵呐喊凡喇叭吹擺隊伍是要各兵即於行次每哨一聚各留空地擺定凡喇叭吹單擺開是要各隊即便挨隊甲踈疏擺開每一小隊相平離一丈五尺凡旗點過只吹喇叭一長聲是要各兵轉身照旗所向轉過凡打銅鑼是要各兵坐地休息凡吹哱囉是要各兵起身執器械站立凡點步鼓是要各兵照先樹起的旗次發兵行營每點鼓一聲走十步凡擂鼓是要各兵趨跑向前對敵交鋒凡下營定擂鼓立中軍旗是放火兵出營樵汲掌號是收回凡各舉動與交鋒但聞鳴金一聲即便立止又鳴一聲是要各兵退還連鳴二聲是要各兵又於腳下便再轉身向前立定凡打金邊是發人探賊凡摔鈸響是要各收隊即將原單擺開的兵照舊收成各哨再收成每營一處凡塘報搖小黃旗是有賊至凡旗幟各兵認定各總哨顔色但本總旗立起即便收拾聽令若旗左點則即左行右點即右行前點即前行後點即後行隨旗所指而往本總旗收捲在地即各聽令立定如旗不起腳下即是信地雖天神來叫移動也不許依從擅動夜看髙招火鼓與晝一般凡鳥銃遇賊不許早放不許一遍盡放每至賊近銃裝不及往往誤了衆人性命今後遇賊至一百步之內聽吹竹筒響在兵前擺開每一哨前擺一隊聽本管放銃一箇才許放銃每吹喇叭一聲放一遍擺陳照操法若喇叭連吹不止及銃一齊盡放不必分層凡弩手射手候鳥銃打放將完賊至六十步之內起火放方許繼銃後射箭無令不許擅發凡鴛鴦陳乃殺賊必勝屢效者此是緊要束伍第一戰法今開式于後二牌平列狼筅各跟一牌以防拿牌人後身長鎗每二枝各分管一牌一筅短兵防長鎗進的老了即便殺上伍長執挨牌在前餘兵照鴛鴦陳緊隨牌後其挨牌手低頭執牌前進如已聞鼓聲而遲疑不進即以軍法斬首其餘兵仗牌刀遮抵手後緊隨牌進交鋒筅以救牌長鎗救筅短兵救長鎗牌手陳亡伍下兵通斬要依此法無不勝矣凡旗幟製八方則色雜而衆目難辨如以東南西北為名則愚民一時迷失方向即難認惟左右前後屬人之一身但一人皆有左右前後庶為易曉而在讀書有位者自知即五方五行之製也然不可以之責行伍之人凡面所向謂之前則用紅旗即方為南行為火火之色屬紅神為朱雀卦為離凡面所背謂之後則用黑旗即方為北行為水水之色屬黑神為玄武卦為坎凡左手所指謂之左則用青旗即方為東行為木木之色屬青神為青龍卦為震凡右手所指謂之右則用白旗即方為西行為金金之色屬白神為白虎卦為兑凡腳下所立謂之中央則用黃旗即行為土土之色屬黃方為中神為勾陳卦為太極凡人一身皆有左手右手前面背後中央此人人可曉若舉點黃旗則是中軍欲變動聽號令施行若舉紅旗則是前營兵欲變動聽號令施行若舉白旗則是右營兵欲變動聽號令施行若舉青旗則是左營兵欲變動聽號令施行若舉黑旗則是後營兵欲變動聽號令施行仍不必拘五營之次但見舉黑旗俱要往後看但見舉紅旗俱要往前看但見舉青旗俱要向左看但見舉白旗俱要向右看但見舉黃旗四面俱要向中看若見五方五旗俱舉點各營四方各照本方向外執立聽號令施行凡旗點向何方隨其所點向往旗不定不止旗不伏不坐善哉孫武子教宫嬪曰汝知而左右手心背乎嗚呼此教戰之指南此千載不傳之祕文此余獨悟之妙也揭以示人尤為可惜凡新兵初集束伍既完即摘出此卷每兵即與一本使之誦熟以知號令方可言場操也紀效新書卷二
