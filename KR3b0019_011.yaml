body:
  text: 紀效新書卷十一明戚繼光撰藤牌總說篇第十一千古有圓長二色其來尚矣主衛而不主刺國初木加以革重而不利步以藤為牌近出福建銃子雖不能隔而矢石鎗刀皆可蔽所以代甲胄之用在南方田塍泥雨中頗稱極便其體須輕堅密務使遮蔽一身上下四旁無所不備用牌之間復有所謂標者所以奪人之目而為我之疑兵所賴以勝人者也牌無標能禦而不能殺將欲進步然後起標勿輕發以敗其事腰刀用於發標之後以殺敵非長利輕泛則不能接遠其習牌之人又須膽勇氣力輕足便捷少年然後可授之以此置於行伍之先為衆人之藩蔽衛以長短之器為彼之應援以之臨敵其衆可合而不可離可用而不可疲進退左右無所不利此藤牌之功用也今將牌勢之可録者繪說於後一習藤牌人牌一面內用大藤為骨以藤蔑條條退藤纏聨每面隨牌標鎗二枝腰刀一把其兵執牌作勢向敵以標執在右手腰刀橫在牌裏挽手之上以腕抵住待敵長鎗將及身擲標刺之中與不中敵必用鎗顧撥我即乘隙徑進急取出刀在右隨牌砍殺一入鎗身之內則鎗為棄物我必勝彼矣但擲標後而倉惶不及取刀是一大病其禦短兵更易右標鎗或用稠木細竹皆可但前重而後輕前稍粗而後稍細為得法一試牌跳牌舊法聽鑼聲為度覱牌如壁閃牌如電起伏得宜翻身下露身滚牌下露足惟牌能殺敵能蔽身用之乃拒徑敵以衛兵也大士星牌歌覱牌砍刀上步再覱牌砍刀背牌擎刀絞絲步回撒花蓋頂收了出牌見刀翻身上小跳翻身下出牌韯刀翻身上小跳翻身下閃馬牌歌曰韯牌再韯牌砍一刀復一刀翻身上小跳翻身下又砍一刀又復一刀又砍一刀又復一刀翻身上小跳翻身下狼筅總說狼筅之為器也形體重滯轉移艱難非若他技之出入便捷似非利器也殊不知乃行伍之籓籬一軍之門户如人之居室未有門户扃鍵而盜賊能入者雖然得人而用之則可以制人不得其人則制於人矣干將太阿之利使童子而持於國門之外則必有袒背而奪之者何也其所能乖其所使故也凡用狼筅須要節密枝堅杪加利刃要擇力大之人能以勝此者勿為物所使矣然後以牌盾蔽其前以長鎗夾其左右舉動疾齊必須叉耙大刀接翼然筅能禦而不能殺非有諸色利器相資鮮克有濟兵中所以必於用此者緣士心臨敵動怯他器單薄人膽搖奪雖平日十分精習便多張皇失措忘其故態惟筅則枝梢茂盛遮蔽一身有餘眼前可恃足以壯膽助氣庶人敢站定若精兵風雨之勢則此器為重贅之物矣紀效新書卷十一
