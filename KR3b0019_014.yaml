body:
  text: 紀效新書卷十四明戚繼光撰拳經捷要篇第十四此藝不甚預於兵能有餘力則亦武門所當習但衆之不能強者亦聽其所便耳於是以此為諸篇之末第十四拳法似無預於大戰之技然活動手足慣勤肢體此為初學入藝之門也故存於後以備一家學拳要身法活便手法便利腳法輕固進退得宜腿可飛騰而其妙也顛起倒插而其猛也披劈橫拳而其快也活捉朝天而其柔也知當斜閃故擇其拳之善者三十二勢勢勢相承遇敵制勝變化無窮微妙莫測窈焉冥焉人不得而窺者謂之神俗云拳打不知是迅雷不及掩耳所謂不招不架只是一下犯了招架就有十下博記廣學多算而勝古今拳家宋太祖有三十二勢長拳又有六步拳猴拳囮拳名勢各有所稱而實大同小異至今之溫家七十二行拳三十六合鎖二十四棄探馬八閃畨十二短此亦善之善者也吕紅八下雖剛未及綿張短打山東李半天之腿鷹爪王之拿千跌張之跌張伯敬之打少林寺之棍與青田棍法相兼楊氏鎗法與巴子拳棍皆今之有名者雖各有所缺傳有上而無下有下而無上就可取勝於人此不過偏於一隅若以各家拳法兼而習之正如常山蛇陳法擊首則尾應擊尾則首應擊其身而首尾相應此謂上下周旋無有不勝大抵拳棍刀鎗叉耙劔戟弓矢鈎鐮挨牌之類莫不先由拳法活動身手其拳也為武藝之源今繪之以勢注之以訣以啓後學既得藝必試敵切不可以勝負為愧為竒當思何以勝之何以敗之勉而久試怯敵還是藝淺善戰必定藝精古云藝髙人膽大信不誣矣余在舟山公署得參戎劉草堂打拳所謂犯了招架便是十下之謂也此最妙即棍中之連打紀效新書卷十四
