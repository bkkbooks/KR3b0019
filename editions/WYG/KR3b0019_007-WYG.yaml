front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0019_WYG_007-1a, image: WYG0728/WYG0728-0534a.png}
body:
  text: 紀效新書卷七明戚繼光撰行營野營軍令禁約篇第七凡操中法令旗鼓既習將來必試敵而調發所不免也故即以行營篇為第七凡派探夜不收派探不的聼人言語不親到賊所欺詐因而誤失事機者軍法從事若𫝊報違期集兵遷延以致誤事罪同凡軍行在途遇有疾病把總官驗實隨即禀明給文送所在官司撥醫調治痊可即便追來敢有詐病推避者治以軍法凡旁哨後哨見有乏弱人馬不能前進或在路旁潜藏者隨即收送中軍不許私自縱放凡軍行定委巡哨官生二員止宿委巡視官生二員差巡視旗十面但有干犯軍令即便指實呈報不許隱匿及因而需索詐騙者各依法究治凡前哨官前途給與清道藍旗十面令旗一面凡遇大小事務俱要差人傳報中軍清道旗手仍先期禁斷人畜不許攙入隊伍衝冒旗纛如遇應該迎候禀事人員及各處差來齎送𦂳急公文之人前總領哨官審實差人報知方許進見倘有異言異服可疑之人送中軍研審發落不許擅放擅問凡止宿住食去處除下野營照臨敵號令外若有人家或進城郭則前哨至城門前面各把總哨官頭目即於通衢或在於人家之外相地放起火或若干枝即為幾路挨劄在彼候中軍到隊之中放静砲三箇每隊差火頭先進城入人家討取歇家令旗押隨完畢回報中軍方傳令照教塲散隊安歇巡視旗分哨巡邏生事之人遇再起行仍照前初出規矩凡軍行在路遺落器械什物見者許即收帶至止宿處送中軍招人認領失物得物之人照格賞罰隱匿不報者治罪亦不許私相交割凡分兵數道臨發時務要㑹定記號如賊界相逢不分晝夜各即駐隊互舉原定記號以辨真偽凡軍臨賊境或林木異常與賊共守之處各兵嚴勒器械須立定以待候差各塘報搜覆無警再聼令行凡臨賊遇沮澤坑坎不可擅即暗過須據平原備將地形禀覆中軍號令再行凡官軍啟行各須披甲戴盔執器械庶幾臨敵輕便不許併執肩縛若路逺天熱得令方許更傳凡火器應用繩藥鉛子銃手須於出征頭一日請給完足不許臨賊假稱放盡討索通以畏避論罪劄野營説野外屯劄對壘列營畫地以守於前樵蘇以繼于後夜防警襲晝結行陣其役也勞其事也險使吾氣常鋭戰守兼舉吁豈易易哉凡毎日五更盡擂鼔已畢各起梳洗聼掌號二遍各兵通赴木城邊各擎鎗立定作守城之勢各營把門人役赴中軍報守門無事訖聼鳴鼓升旗各營開門放汲其汲者限四刻掌頭號落旗回營進城蔬菜等項者限一箇時辰到營外取齊聼掌二號進營遲進及後出者俱打二十棍每隊三名以上隊長同責四隊俱有合九名以上者哨長官同責申時放汲一次號令執鎗之法俱同早辰買蔬菜止許早辰一次凡樵採每三日一次於辰飯後正己時聼中軍掌號一盪掣起樵字旗俱出每官下用隊長一名領去限兩時辰俱到營外候齊集赴中軍掌號二盪各兵仍赴木城邊擎鎗如前方開東西二門放進餘門不許凡登厠員役照各厠坑由各營門將腰牌懸於門上方准開門而出赴坑所事畢即還自認取腰牌回營如夜間不許出營即於各自厰邊方便天明即打掃送出坑内違者照前汲水例行法凡中軍遇晩鼓擂三次畢各營通即斷火禁喧斷人行違者隊長與兵同治隊長有犯官哨一體各打三十棍凡差伏路人役毎一晝夜換班一次俱以辰飯畢遣出到彼該回之人即還赴中軍銷報凡夜間遇有報事人役先令門外約近二十歩之間即喝令立定守門人辨其聲音如係别衙門差來問其别衙門來歴如有書帖文移者令將書帖文移擲在地下著營外傳語人取逓由木城縫接送中軍有令箭放進者方許開門放進無令箭者不准如有遷延不去及不遵禁止徑闖木城下者許即打射殺死者勿論凡本營人夜來報事諭令先報自己名隊然後説事一例止於營外聼令凡遇賊臨近不拘營内營外違令者俱軍法從重决不輕貸而生凡官兵無故非時違令出營者綑打一百棍遊營示衆二十名以上官同法十名以上哨長同法三名以上止於隊長伍長凡伏路之兵即以各枝分劄地方所向之方為信地毎日辰時後赴中軍領令箭赴彼交替日則辨驗徃來真偽盤詰奸細照前更換遇有各衙門營寨公差人役欲赴本營者夜則於内令一人陪送到營二十歩外止住先許陪來兵高説差人來歴守門人即與禀赴中軍聼令進退凡夜傳暗更籌箭每隊撥兵二名守木城即傳箭迷失更箭者上下挨查得出軍法示衆凡遇有警肅静各守信地木城閉聼令發兵如有喧言亂走者軍法重治凡更籌遇日晦夜暗行軍宿野必須定更則時以知早晚緩急之備先以一日有百刻分一十二時每一時有八刻二十分每一刻六十分共五百分為一時依二十四氣節為十二籌以日出入為則每籌長二尺四寸上書各得本節日出入時刻分晝夜長短之數或不用籌計珠二串一串用小珠七百四十箇為數𦂳慢行數七百四十餘歩或數珠七百四十餘箇程限該二里二十七歩餘為一刻行數七千四百七十餘箇程限二十里二百七十餘歩為十刻晝夜該七萬四千七百餘歩程限二百零八里有餘是為百刻每一時八刻二十分該行六千二百二十五歩數珠即六千二百二十五箇為一時十二時約程限與百刻同凡定更籌晝方名長短不同依十二時候節氣各以長短刻數隨時分𣲖朝以日出夜以日入為始時定而更漏均大同小異可為警備矣且如安營一面一百八十八歩四面共七百五十二歩行遍若𫝊籌五十次共餘五百餘歩日將出矣如冬至夜極長夏至夜極短二十四氣皆有異同餘各倣此凡下野營在賊不知之處日落斷火不許燎燒柴草恐賊逺望夜來攻我營寨夜間不許支更鼓止令𫝊箭約量同數定立更次守門人須要辨認奸細非奉將令不許擅開營門如與賊對壘須去營二十歩每隊然火一堆徹夜見賊即與抵敵勿近自營使我不能見賊自暗中望明來攻我凡夜營俱照定過燈炬為號各㸔燈籠遵依各哨視中軍之燈各隊視本哨之燈各兵視本隊之燈如視晝旗一般違錯俱比白晝軍法加一等遇大風雨則視火把遇出竒或暗地移營别處燈籠留在虚營各聼隨時編發字號如中軍説甲字則是左哨凡言甲字者即是左哨第一隊餘倣此不預定者恐奸細知之也如再近賊則又不用字號以禽獸之聲為號隨時給與哨官哨官依次相諭通知學鷄鳴為某哨學牛鳴為某哨之類皆不預設陸兵舟行號令示各總知悉違者連坐一起行處所中軍放砲一箇鳴鼓升行旗大吹打畢掌號笛各官哨長赴中軍聼發放本日所行所止之意畢散回聼放砲吹天鵞聲呐喊三聲㸃鼓豎何旗色照旗色相同應行之營一體㸃鼓開船一起行次序以日干所臨甲乙丙丁戊己庚辛壬癸五行為前鋒先行餘照營次若行間遇中軍放大砲一箇晝磨旗夜卓雙燈即便駐船營各照方向泊齊圍住中軍聼令一到止宿去處前行之營放砲三箇鳴金落旗離營約去一箭之逺每一營為一䑸一體落旗聼中軍到落旗後仍復升旗是掌號笛發放若不升旗各官目有𦂳事者赴禀事無事者謹守信地訓齊兵伍若有更令必差巡視旗口傳或有令票不在此内一凡水陸行營第一肅静為要不拘何事俱聼旗鼓號令不許口𫝊口𫝊之言雖本府面説亦不許從除明白進止用旗鼓號頭照原給令書外若或近賊或欲暗行暗止聼中軍如後開𫝊令一人挨逓一人不分官目雖本府亦自逓之一物件挨次逓過即便遵守陸路同要住傳土塊要行傳小短箭要立𫝊草木枝要坐𫝊石塊要有警收拾器械預防賊來衝殺𫝊大令箭即便於脚下隨便每哨官為一營搶擇地勢照給過原操令書内營陣立定聼候中軍傳令每給為一處不許相連一止宿處所每營四哨官内輪撥兵一小哨赴把總處巡夜每營輪一哨官巡夜其本夜内驚恐火燭奸細之變俱罪坐本官其把總不時親自密查一止宿處所船隻各隨到齊各分營定訖到日晩聼中軍放砲三箇打闗門鼓畢俟擂鼓各營照中軍一體聚巡夜人在把總船邊跪下發放陸行同發放云官兵聼著齊應夜巡謹慎齊應毋得懈惰齊應誤了事軍法不饒齊應起去齊應聼定更喇叭一聲凡把總處支更其每船一隻内不分大小輪議五人毎更一名在船頭執竹梆支更毎打鼓一聲打梆一遍天明各赴本營回話一以上乃明營也若暗住處所聼臨時傳知即便起暗號支暗更暗傳約束非用令票即用巡視旗但初起或初止時中軍不卓旗及落旗不擂鼓不放砲吹打即是要行暗令一中軍官每日輪撥一哨赴本府執打器械𦂳隨轎馬進止擺圍于後夜則即以此哨巡夜每輪中軍官一員提更兵兵兵大刀藤牌兵兵兵大刀藤牌兵兵兵鎗藤牌兵兵兵大刀藤牌鎗藤牌大刀藤牌兵兵兵兵兵兵一水陸住止處所遇本府馬到先於一里内差塘報二名進歇處搜過出衙門百歩回報無事則不言若衙門不便難宿或有奸細即便口禀一本府進時親兵在前者擺進衙門内在後者即便于衙門外大街通人行處街口去衙門二十歩内各執器械把定清禁人言仍輪一官坐巡邏俟本府閉門方許聚赴衙門首聼火兵送飯食用一凡大開門時凡小開門聼中軍官即將輪日親兵在外照前頃擺定一半帶進丹墀擺列乃用四人在堂上帶短刀立定口報訖方聼開門若在人家一體相同比在衙門更加謹慎在野宿亦與在城相同比在城更加謹慎第一肅静為主凡有平時喧嚷者綑打四十連坐遇傳號令下營陣止起之際耳只聼金鼓號頭眼只看旗幟决不許口發一言但有喧嚷出聲者拿治如前臨陣割耳回兵查若因而誤事者斬首示衆紀效新書卷七
