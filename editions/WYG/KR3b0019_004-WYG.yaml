front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0019_WYG_004-1a, image: WYG0728/WYG0728-0522a.png}
body:
  text: 紀效新書卷四明戚繼光撰諭兵𦂳要禁令篇第四號令既繁人無所措故復分此為别卷其可以少從緩也以次旗鼓號令之餘故以禁令篇為第四凡軍中要𦂳的第一件只是不許諠譁説話凡欲動止進退自有旗幟金鼓若無令許説話但開口者都要著實重處夜間尤是切禁千萬千萬凡兵逃走同隊之人各綑打分一半監固分一半保拿如不獲各監一年通扣工食另募凡征住地方毎隊十二人務在一家安歇時刻不許相離别生事端互相覺察若一家難容即分對門或間壁不許攙隔如不隨本隊住者隊長與各兵以軍法治之一哨在一街一營在一隅各營不許相混各哨不許相混各隊不許相混及行營攙越前後非令先行先歇途中下路一體連坐哨隊長若解手許同隊一人立在道旁候畢催上不許過二里凡立成營盤即是人家牆垣屋舍一般若人家不謹門户及容人牆上扒走的事有也没有但向營出入者不拘何官何人定要由門奉號令方准放出照入决容不得各處攙進攙出如行路時决不容别人兵馬閒人穿路與同路混行倘是賊般的却不被詐劫了營盤此一節又至𦂳至𦂳臨賊而故縱者軍法示衆凡行營三千人單行二三十里有事如何傳得到今定約令凡兵行不拘從何處起若有話該報來務要簡明不過二三句或往前𫝊或往後𫝊自起處俱隊長髙聲接𫝊挨𫝊到止處明白仍𫝊稱知道了再𫝊回原説之人回復若𫝊到半中途差錯許又傳回云纔𫝊的不明白只𫝊到原𫝊話人再𫝊明白隊長一例接𫝊前去若𫝊至中途聞而不接𫝊又差錯者挨出軍法重治因而誤軍機者軍法示衆餘兵並不許開口接助𫝊話多言者割耳凡賞罰軍中要柄若該賞處就是平時要害我的寃家有功也是賞有患難也是扶持看顧若犯軍令就是我的親子姪也要依法施行决不干預恩讐凡武藝不是答應官府的公事是你來當兵防身立功殺賊救命本身上貼骨的勾當爾武藝髙决殺了賊賊如何又㑹殺你你武藝不如他也决殺了你若不學武藝是不要性命的獃子况吃著官銀兩又有賞賜又有刑罰比那費了家私請著教師學武藝的便宜多少想你往日不學武藝器械不整的精利不肯著重甲只是因自來臨陣原無紀律號令不曾分别當先退後者施行軍法方纔安心臨陣要走料定不用鎗刀對手之故今番連坐法已定號令已明進前退後都有箇法子連坐管定軍法决照條内施行你們既無躱身之法不想學武藝不是與性命有讐的人不是獃子是何物身上有甲就使他戳砍我一下不能傷我就手段不濟第二下我也殺到他身上了敢是無甲的㑹死思之思之一編過火兵有能奮學武藝精熟者則陞為兵將兵内懶惰不習武藝號令生疎者改之每月一考平時聽各火兵自首即與驗更凡你們本為立功名報効而集兵是殺賊的東西賊是殺百姓的東西百姓們豈不是要你們的殺賊設使你們果肯殺賊守軍法不擾害他如何不奉承你們只是你們到箇地方百姓不過怕賊搶擄你們也曽搶擄百姓怕賊焚毁你們也曽折毁百姓怕賊殺你們若争起也曽殺他他這百姓如何不避如何不闗門鎖户且如去年我往台州因是衆人家兵難制沿路百姓固也受害兵們宿無處炊無處又被百姓告來拿著的挨累官哨隊長打死了多少如今年我自己的兵宿有程頭火兵先定歇處挨次而入起行依號劄營㸃步鼓挨次而行經過百姓們聞説到殺猪牛販酒米等待是箇店上也要留住一日他有生意這方是兵民相體的光景暑行千里我不曾打一箇兵五棍可不也省了多少打殺兩家都有便宜却不是好也凡古人馭軍曾有兵因天雨取民間一笠以遮鎧即甲也者亦斬首示衆况砍伐人樹株作踐人田産燒燬人房屋奸淫作盜割取亡兵的死頭殺被擄的男子汚被擄的婦人甚至妄殺平民假充賊級天理不容王法不宥者有犯决以軍法從事抵命凡軍中惟有號令一向都被混帳慣了是以賞也不感罰也不畏我今在軍中再無一句虛言與你説凡出口就是軍令就説的差了寧任差誤底决不改還你們但遇號令金鼓旗旛是聽是看是怕不可還指望不便處又告有改移或望寛饒將無還令此在口之常談你們豈不知宋時北兵稱岳爺軍曰撼山容易撼他一箇軍難只是箇畏將法守號令之驗如此則將也成名你們也得成功又保全了性命多少好處今後不知學好的若再平時用好言好語箇箇説是勇猛忠義你就説得活現决不信你只是臨陣做出來便見髙低改圖改圖凡冒名頂替入操者正替身俱以軍法綑打所雇之人即充兵收操工食即將原雇之人分支一半凡兵在家生有父母教有師長戸有户長里有里長老人你們思量那箇做百姓的少得這内一件你今既來當兵甲長就是你的戸長隊長就是你的里長哨長就是你的老人哨官把總就是你的父母官但能教道你們的號令武藝者都是你的師長你再思量世間有無里長老人管的百姓無有就知在軍中有無隊哨長管的兵無有世間有無父母生的人無有就知在軍中有無哨官把總管的兵無有世間有無師長教訓天生㑹識字念文的人無有就知在軍中有無不聽教師將令訓練的兵士無有這都是就你心上少不得的去處曉諭你若抗違哨隊長比做百姓抗違里老的法度不同不聽教師將令習武操練比做童䝉時不聽師訓的法度與平日牧民的法度不同綑打尚是小事重便割去頭再可復生否此諄諄真正化誨你若不聽軍法無情慎之慎之凡你們當兵之日雖刮風下雨袖手髙坐也少不得你一日三分這銀分毫都是官府徵𣲖你地方百姓辦納來的你在家那箇不是耕種的百姓你肯思量在家種田時辦納的苦楚艱難即當思量今日食銀容易又不用你耕種擔作養了一年不過望你一二陣殺勝你不肯殺賊保障他養你何用就是軍法漏網天也假手於人殺你紀效新書卷四
