  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0019_WYG_006-1a, image: WYG0728/WYG0728-0529a.png}
body:
  text: 紀效新書卷六明戚繼光撰比較武藝賞罰篇第六號令既明刑賞以悉坐作進退當與攻殺撃刺同教矣而比較不可無法不知較藝之習而任比較之責則花法入而正法昧矣故為比較篇為第六凡比較武藝務要俱照示學習實敵本事直可對搏打者不許仍學習花鎗等法徒支虛架以圖人前美觀各總哨隊伍官長俱以分數施行賞罰一分以上責成各伍長二分以上責成各教師隊長三分以上責成哨官四分以上責成把總凡長鎗鋒要輕利重不過兩桿要梢輕腰硬根粗凡狼筅各要利刄在頂長一尺四面竹枝須堅直粗大者凡朳杈棍俱要長一丈二尺盖短兵須長用庻可入長鎗毎人解首一把凡弓箭手弓要副各力箭要鐵鏃務三十枝仍各長大腰刀一把解首一把凡弩弓要力大新堅每弩毒藥一瓶鐵箭一百枝毎人腰刀一把解首一把凡立牌要高闊過得後面持鎗之人毎人利長腰刀一把凡藤牌要堅大輕遮一身毎人長刀一把棄鎗三枝藤牌無棄鎗如無牌同盖長短勢絶急不能入須用棄鎗誘之使彼一顧則藤牌乗隙徑入矣以上各條違犯照前分數軍令連坐凡火器裝藥竹筒火繩藥線匙鎚油單火藥一有不全入塲忘記懸帶隨身及藥不乾燥各不如法隊長同罰本犯加治凡兵隨帶百様軍火器械隨壊隨治如力不能私製者即明禀各總處呈置給用把總官毎平時調杳凡人之血氣用則堅怠惰則脆勞其筋骨餓其體膚君相亦然况於兵乎但不宜過於太苦是謂練兵之力凡兵平時所用器械輕重分兩當重交鋒所用之器重者既熟則臨陣用輕者自然手㨗不為器所欺矣是謂練手之力凡平時各兵須學趨跑一氣跑得一里不氣喘纔好如古人足囊以沙漸漸加之臨敵去沙自然輕便是練足之力凡平時習戰人必重甲荷以重物勉強加之庶臨戰身輕進退自速是謂練身之力凡呐喊所以壯軍威有不齊者巡視旗拿來治以軍法凡什物器械刻名隊裝油在上以便查考及踈失一比弩以六十歩為式把高五尺濶一尺五寸三箭中二枝為善射一比鎗先單鎗試其手法歩法身法進退之法復二鎗對試真正交鋒復以二十歩内立木把一面高五尺濶八寸上分目喉心腰足五孔各安一寸木毬在内毎一人執鎗二十歩外聼擂皷擎鎗作勢飛身向前戳去孔内圓木懸于鎗尖上如此遍五孔止一試射官尺八十歩為式把高六尺濶二尺每三矢中二矢為熟一試狼筅先令自使㸔其身手歩法次用鎗對較凡長鎗哄誘不動又能遮隔不入為熟一試釵鈀先令自使㸔其身手歩法合一復單人以長鎗短刀對較能架隔長鎗刀棍翼狼筅出入殺人為熟一試刀以能衝入釵鈀狼筅不及遮隔為熟刀法甚多傳其妙者絶寡尚俟豪傑續之一試挨牌每一人執牌面左一人執狼筅面右俱牌後遮嚴分面立定鎗等雜藝俱照鴛鴦陣立定前設長鎗一人為敵俱鑼響坐定聼吹哱囉起身㸃鼓兩處俱進擂鼓吹天鵞聲喇叭納喊一聲敵兵執長鎗以鎗髙處戳入牌身髙起閣鎗頭上過陣内長鎗伸出殺敵急復原伍次敵兵長鎗戳脚下牌兵用牌坐落陣内長鎗出殺敵急復原伍次敵兵長鎗由左戳進期傷牌兵之臋左面狼筅拿鎗長鎗出殺左面短兵即隨鎗以出防長鎗進老故短以救之急收原伍次敵鎗戳右欲傷右邊後二箇鎗手牌兵即以右手所持腰刀砍其鎗右面長鎗出殺短兵隨出同左邊之例云如賊亦有數人前來則長牌當中只顧低頭執牌前進左筅防左右筅防右左鎗隨左筅出殺右鎗隨右筅出殺左短兵防左鎗進的老了救援右短兵防右鎗進的老了救援藤牌乗二筅之勢於筅中滚出以殺為務鳴金急復原伍進止闔闢左右前後恁是如何厮殺定不可亂了原伍一試藤牌先令自舞試其遮蔽活動之法務要藏身不見及雖藏閉而目猶向外視敵又能管脚下為妙次以長鎗對較令牌持標一枝近敵打去乗彼顧揺便抽刀殺進使人不及反手為精一試摽鎗立銀錢三箇於三十歩内命中或上或中或下不差為熟一試火器以八十歩立五尺髙二尺濶木牌三發一中十發七中為精一試火箭以八十歩亦用銃把平去中式為精歪斜不巾果係作不如法免究其兵製作既精放不如法究兵一千里雷㸃放緩急不誤為熟臨時竒遣不載數内失忘隨砲應用之物及損壊信藥等項俱重治一旗法隨鼓𦂳慢行如磨旗之時兩手托開隂陽拏住高舉伏身轉腰繞頭過一遭方纔豎起一試打鼓之勢用以木槌二根起遲下速兩手髙舉過額而著鼓泥里為可一在塲比較法凡操畢各兵坐息稍乆主將亦暫退休養精神即升堂吹哱囉各起身從便習學聼中軍官豎起藍旗一面當中㸃之各營狼筅手俱聼鼓由發放路集中軍兩邊金鳴鼓止用後式裝成文册㸃名比較如前條法比較賞罰畢仆藍旗各照原路回伍聼鳴鑼坐息盖狼筅之功在竹属木故舉藍旗以應之次舉黄圓旗長牌藤牌手一照狼筅手㸃鼓通集䑓下比較如前條約賞罰畢仆旗各回原伍盖牌主禦故舉黄旗以應之而圓則象形也次舉白旗各營長鎗手一照狼筅手號令赴臺下照前條約比較賞罰畢仆旗各回原伍盖長鎗之利在刃刃属金故舉白旗以應之次舉黒旗各營各色叉鈀短兵一照狼筅手號令集臺下各照前條約比較賞罰畢仆旗各回原伍盖短兵勢節險短如水之激故舉黒旗以應之次舉紅旗立把子各營鳥銃火箭弩手俱赴臺下比較畢仆旗各還原伍盖神器属火而弓矢皆前行之器故舉紅旗以應之左篇乃比較册由頭一比較武藝初試定為上等三則中等三則下等三則再比仍如原等者不賞進一則者賞銀一分進二則者賞銀二分超進一等賞銀五分一次原等免責二次原等打五棍三次原等打十棍五次以上原等不進者打四十棍革退如有不願打者每一次追一分二次追二分三次追三分即付武藝考進之人充賞一賞罰鳥銃三彈中一者平中二者賞銀一分中三者超賞五分一次不中者打三棍二次不中者打六棍三次不中者打九棍五次不中者打四十棍革退不願打者一次罰銀五釐二次一分三次一分半弓弩同例紀效新書卷六
