body:
  text: 紀效新書卷九明戚繼光撰出征起程在途行營篇第九一主將先傳令票箭期會訖不拘時分但聞第一盪喇叭收拾軍裝做飯喫訖㸃查乾糧一面先將前哨塘報人馬每塘五名各以相望為准不拘遠近每路設二十四塘大約二十餘里以内自人馬聚處通該差塘報一齊令行至一里外或不及但彼此可以相望如視望不眞即畱住一塘立旗站定别塘再走至僅可望見又畱一層只至畱到二十四層立完站候聽吹第二盪喇叭中軍擺清道旗出次領哨把總等官領人馬挨哨出城主將居中軍第三盪喇叭掌號􅅇官旗聽發放畢各回哨中軍㸃皷如一路行則中軍先㸃大紅旗一面以前總居前次左總次中總次中軍次右總次後總俟各行開已畢中軍豎高招一竿各部高招俱起如圖一路行兵行則塘報亦行兵止則塘報亦止如前途稍寛中軍行至寛處放砲一箇各於脚下立定聽起火二枝放砲二箇立起高招二竿即如圖聽二路行看㸃藍旗則左總由左行與前總頭平不動中軍藍旗伏二總旗亦伏中軍又㸃黑旗後總由左行與右總頭平立定放砲二箇㸃皷二路行如路又稍寛中軍放砲一箇各俱脚下立定聽放起火三枝砲三箇中軍豎高招三竿黄旗急㸃前兩路平開空中一路待中總進入與前左二頭平再放砲三箇㸃皷作三路行如路再寛可四路行中軍放砲一箇各即於脚下立定聽中軍放起火四枝砲四箇豎起高招四竿前總不動白旗㸃動右總入左總之右二頭相平後總入左總之左四頭相平中軍居其後再放砲四箇起火四枝㸃皷作四路行如路再寛可五路行中軍放砲一箇各仍立定聽舉起火五枝放砲五箇黄旗㸃中總入居其中再放砲五箇起火五枝㸃皷作擡營而行如五路欲變四三二一路或四三二一路各因道路寛狹變行俱如前層變過圖但聽看中軍旣放止砲之後有起火幾枝砲幾箇㸃某色旗即依數分幾路如遇賊凢四五路行即變方營待敵如一三路行之際即變照急營前總速照一總操法備戰左右後三總即各設伏出翼劄老營分投而作前兵見報如賊不來迎戰止許伏哨劄營以待中軍號令不爾擅便輕易失事照節制圖式施行一前哨有五方旗一副高招一副有事方開見林木開青旗阻水澤開黑旗遇兵馬開白旗山險開黄旗煙火開紅旗過所見之物即捲其高招如道可一路行立一面二路行立二面三路行立三面四路行立四面擡營行立五面後部挨隊遞相傳開一凡塘報哨見賊急則磨紅旗緩則磨黄旗衆則磨青旗少則磨白旗無路可行則磨黒旗一層旣磨各層照前一時俱磨一層退至一層如賊不來復又立定如賊再追一層又退一層只退至營前斷不許見賊磨旗之後不論賊之追不追來一齊擁衆徑回如此軍法示衆一如賊自塘馬腰内突出與我兵忽遇不及下營者即下急營我兵即時於所行之地立定近賊者不必抽間隊盡數備敵先銃平列打賊次挨牌短兵出戰其無賊處一面照操撥人應援一面安立釘牌拒馬為一字陣别部應發援兵者或包水港溝渠若賊可望見者止守營不許遣接奇兵恐賊乘之如賊不見之處雖有險隘溝渠正我兵出奇必勝之利亦須相險設智别渡精銳一二百人遶出不意必可取勝此上策也蓋猝遇賊非伊前鋒則為後殿及或四散搶刧零賊必無大衆惟有制必取勝也一行營該傳金皷旗號一大將旗皷行軍擺列清道臨時變戰營圖說一擺列圖另開在後一凡有職人員倶全裝披執軍器軍令牌四面可用四人大門旗十面每面用人二名五方旗十五面神旗五面單擺飛虎旗五面五方擺五行五面一字擺用人十五名角旗十面每面一名五方高招正副十面用人二十名坐纛一面用人五名護纛親兵二十五名押旗令旗二十四面用人二十四名下營即散營内督察監軍金皷旗四面用人四名金皷二副鉦二摔鈸二哱囉四喇叭四皷十二􅅇二板二細樂八共用吹皷手三十八名每五方旗高招一面後護旗各精兵五名共十層用兵五十名將馬前令牌三面官三員長短兵每排五名共五層通一隊二十五名馬後令字小旗牌背招一十二面用馬十二匹親信膽勇員役執之每四人一層分三層專聽督遣密令押後兵二十五名各用長短器一細近路如線則每五人以中一人前後四人分二層各去一步使不渾别層之意前後層各十步一路寛遠則每層照單擺列每前後各去十五步一遇賊報正行間中軍聞報放起火一枝砲響一聲五方大旗内黄旗即隨主將踏定戰地豎起前後旗號倶攢來黄旗下四方分出立表每方門旗以下旗招護兵等役倶隨各旗列方其本方旗居門旗之中招居方旗之後招高於方旗方旗高於門旗金甲旗幷金皷旗領金皷居将之左右列前兵一隊居将前令字招旗居将後専聽指麾督兵戰殺後親兵一隊两分列於金皷之外紀效新書卷九
