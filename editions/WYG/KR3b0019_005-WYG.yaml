front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0019_WYG_005-1a, image: WYG0728/WYG0728-0526a.png}
body:
  text: 紀效新書卷五明戚繼光撰教官兵法令禁約篇第五此篇之中亦有兵士當知者但士卒者愚人也繁以號令而無所遵不如無令而氣壯故明以教官兵之法為第五凡將領官哨隊長不相和協傾䧟妬忌煽惑妖言妄傳軍令因而誤事者斬凡各營分𣲖已定先照各腰牌格式共為一函造書册二部俱送本部印鈐一本發把總一收本府凡有逃故缺伍該召補兵勇每月半隊長如式開新補手本呈哨官哨官呈總總呈府驗中改簿給腰牌發總總改發隊常操凡遇有逃故本伍即刻報隊長隊長報哨長哨長報哨官哨官報把總即於本日開手本呈逓凡各兵遇有疾病本日同夥即報本隊長隊長親看緩急報赴哨官哨官報赴本總本總即日報本府以憑批醫療視遇在客戍本府親詣撫視一常日每一名各將米二升炒黄包裹一升研為細末一升另包麥麵二升一升用香油作煤一升蒸熟六合用好燒酒浸晒乾再浸以不入為度研為麵另包四合用鹽醋晒浸以不入為度晒研為末另包行軍之際非被賊圍困至緊不許用出兵隨行忘帯者如失軍器同凡各兵進教塲過放静砲後到者俱開不到究治各門封鎻後閒人出入及縱遊兵闖營皆巡視旗之罪凡毎日進操候下營畢各官下地方即將所部兵士省令各隊填到單已到止開總數未到及有差俱開花名把總官類粘候下營畢赴臺呈逓如主將不進教塲操畢各官齎赴回操即日呈逓凡器械不鮮明專罪哨長號令不明專罪把總武藝不精習專罪哨官逃去奸盗等事不詰首專罪隊長與同隊甲兵凡責成之例不拘平時臨陣凡違誤遲玩畏避退縮器鈍事犯等項毎甲三人以上連坐甲長每隊一甲以上連坐隊長毎哨一隊以上連坐哨長五分以上連坐領兵官哨官凡遇傳示號令巡視旗止傳各領兵官領兵官傳與哨長哨長傳隊長隊長傳甲長甲長傳各兵若有得令不傳傳到不遵者常操遲誤打四十棍臨征軍法施行我一人你們三四千一句説話如何傳得遍知我有事要分付只是𫝊與把總哨官把總哨官須要一一傳説與哨隊長哨隊長須要一一傳説與兵勇若是分付去一時記不全了還許來問我我再説去分付他若傳説不明或忘了不來再問聼我倐於隊内抽取數兵來問若問稱不知挨查隊長隊長不知挨查哨長以次挨到把總各傳不明軍法重治凡平時無警在乆住地方哨官以上許冠帯哨長義士許青衣隊長許青布衫繋縧其禮儀把總之待哨官哨官之待哨隊長哨隊長之待兵許以鄉情從便相待但坐須要側侍不許齊肩平列雖下至隊長與兵亦然凡進操及征調在外與凡掌號笛發放把總官即戎裝錦繡哨隊長各小袖依方色戎衣執旗俱以軍容承接發放之際哨官凡有禀白跪聼把總授成哨長跪聼哨官授成隊長跪聼哨長傳令發放小兵跪聼隊長傳令發放哨長以下是把總門頭俯伏隊長以下見哨官亦如之凡公所哨官見把總一跪一揖哨長見把總兩跪一揖隊長不許作揖哨長見哨官一跪一揖隊長亦不許作揖隊長見哨長作揖侍立俗諺有軍中立草為標况朝廷堂堂名分凡有屬下者既知惡属下抗違不能行事即知己身不可又效属下之人復抗在上頭目决恃不得鄉曲故交軍機乃國家重務情難掩法敢有親識相容故違明抗容者犯者通以軍法重治紀效新書卷五
