  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0019_WYG_003-1a, image: WYG0728/WYG0728-0518c.png}
body:
  text: 紀效新書卷三明戚繼光撰臨陣連坐軍法篇第三旗鼓既習斯謂之名一衆人之目矣而心則未也于是申之以連坐賞罰以威其心故軍法篇為第三凡臨陣的好漢只有數人每斬獲首級常是數十百人叢來報功再不想你一起人退來報功使衆兵相望誤認是敗走大家都走了况一箇賊首數十人報功若斬數十賊首就該數百人來報不知這一陣上能有㡬箇數百人反是自誤了性命此臨陣第一禁約今後其長牌長鎗狼筅凡該當先長兵之數决不許帶解首刀只管當先殺去不許立定顧戀首級其殺倒之賊許各隊短兵砍首毎一顆止許一人就提在陣後待殺完收兵有令催驗方許離陣赴驗其誰當先誰有分誰無分俱聽當先隊長對衆從公報審敢有因其恩讐報不公者軍法毎顆首級以三十兩論之當先牌鎗筅分二十兩砍首兵二兩餘兵無分者分一兩火兵雖不上陣本隊有功亦分五錢毎顆本隊鳥銃手亦分二兩凡戰間賊遺財寳金銀布帛器械之類此誘我兵争財彼得乘機衝殺往往墮此套中今後臨陣遇有財帛毎隊止留隊中一人收拾看守待賊平照隊收拾之多寡各給本隊兵均分百哨隊長加一倍必不許他官尅留及後進次到隊伍仍留人渾賴此正是賊當窮敗之際各兵照常奮勇前進務要加力百倍庶賊可滅如違令圖財致兵陷沒或賊衝突得脱搶財物之兵不分首從總哨官俱以軍法斬凡臨陣退縮許甲長割兵耳隊長割甲長耳哨官哨長割隊長耳把總割哨官哨長耳回兵查無耳者斬若各故縱明視退縮不肯割耳者罪坐不肯割耳之人退縮之犯不究凡伏兵遇賊不起及起早者領伏兵隊長通斬各兵扣工食給恤仍通綑打如正兵見竒兵伏兵已起不即回應者同例凡毎甲一人當先八人不救致令陣亡者八人俱斬陣亡一人即斬獲真賊一級八人免罪亡一得二八人通賞哨隊照例凡當先者一甲被圍二甲不救一隊被圍本哨各隊不救一哨被圍别哨不救致令陷失者俱軍法斬其哨隊甲長凡陣亡一人本甲無賊級者各扣工食一月給亡者之家優恤失隊者扣一隊失哨長扣一哨失官扣一枝但係亡者屬下頭目仍斬獲功如其所失通免究亦不扣工食亡兵亡官官為給銀優恤凡一人對敵先退斬其甲長若甲長不退而兵退陣亡甲長從厚優恤餘兵斬首若甲長退走或各甲俱退走斬其隊長若隊長不退而甲下并兵退走致隊長陣亡者厚恤其隊長之家本隊兵各扣工食二箇月給亡隊長家領用隊下甲長俱斬若一哨下各隊長兵俱退走者斬其哨長如哨長不走致被陣亡而隊兵棄之退走者斬其各隊長兵通罰工食二月恤哨長之家若一哨官之兵與哨官俱退走斬其哨官如哨官不走而哨長以下甲兵退走斬其各哨長通罰工食給恤哨官之家由是而上至把總領兵將領等官皆照此一體連坐行之凡所謂罰工食者仍以軍法綑打不死而又罰其工食非止于罰工食而免也凡所謂恤其家者不止于罰兵工食以恤之仍有題奏廕子世襲之恤也凡若大陣敗走被賊殺死官兵傷在背後者還以敗事論并不優恤仍罪其各家并原募之人凡器械借代頑鈍欠利私擅更易軍裝器械入塲忘帶一件以上者軍法綑打照臨陣事例伍隊長總哨官連坐凡行列不齊行走錯亂擅離隊伍㸃鼓不行聞金不止按旗不伏舉旗不興開旗不接得令不傳傳令不明道路擠塞言語諠譁者俱治軍法凡臨戰布陣已定移足回頭行伍擠拶稀密不均俱斬其哨官長牌手并所犯凡不拘晝夜但係中軍起火銃砲齊起即是忽然警急各官兵不必待候常令即各自劄營遇敵即戰不必取禀中軍號令凡差探賊塘報及官兵有聞賊中消息不拘要𦂳不要𦂳不許官兵於中途邀截問答徑自閉口速赴主將陳説之後許宣於衆者方可與把總等官説若未見主將之先敢於中途因人問起即便説出但有一人先知在主將之前定以泄漏軍機問者答者皆坐軍法就是本管的把總哨夥伴問也不許對他説又或有已經禀知主將之後蒙分付不許𫝊説者到底不許再泄敢有以强固行要問者許原人禀來一體重治凡遇賊各隊嚴備聽令候探知賊人多寡以憑發兵不許違令争先恐陷不測凡臨陣抛棄軍器者及不衝鋒官兵臨戰易换軍士精利器械馬匹者各以軍法從事凡臨陣詐稱疾病畏避艱險者及故將軍器毁折以圖躱避者斬此亦另為一卷俟給旗鼓篇習熟之後即給此卷習之所以不同給者蓋初用偏裨行伍下質一閲其多苦難自畫矣故次第給而習之以誘其入一為禁革斬級以保全勝事照得衝鋒之士毎因取級致防戰殺以致失事今該本府㑹同兵巡道廣集總哨頭目名勇員役當於教塲公議今後臨陣大兵只管整隊殺將前去止以衝鋒殺敗賊冦為功務求全勝不許斬取首級如有故取首級者當陣許頭目巡視旗哨隊長人等割耳回兵查無耳者與各兵仍又持首級報功者俱一聽斬首為今之計别選親兵每哨官三甲每甲五名兩膊上縫有取功二字白布印二片為號各隨𣲖到本哨官兵陣之後待兵殺倒賊人在地又戰過前卡替兵割取賊級收兵之後將前項首級書數𣲖與本哨官部内衝鋒兵勇均分報功其割級親兵止是給賞並不干預若有隱藏不報者及割取不完親兵官哨隊伍長俱斬首除割首級哨隊長兵夫專委把總管束外為此票仰各該官役遵照施行毋得自干重典未便計開某營某哨哨官某人下𣲖該斬取首級哨官某人哨長某人隊長某人兵夫某人紀效新書卷三
