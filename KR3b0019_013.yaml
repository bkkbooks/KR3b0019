body:
  text: 紀效新書卷十三明戚繼光撰射法篇第十三一列女傳云怒氣開弓息氣放箭蓋怒氣開弓則力雄而引滿息氣放箭則心定而慮周一量力調弓量弓制矢此為至要也故荀子曰弓矢不調羿不能以必中孟子謂羿之教人射必至於彀學者亦必至於彀射家要法一持弓矢審固審者詳審固者把持堅固也一凡打袖皆因把持不定一凡矢搖而弱皆因鏃不上指也一法曰鏃不上指必無中理指不知鏃同於無目此指字乃是左手中指末知鏃者指末自知鏃到不假於目也必指末知鏃然後為滿必箭箭皆知鏃方可言射一審者審於弓滿矢發之際今人多於大半矢之時審之亦何益乎一審者今人皆以為審的而已殊不知審的第審中之一事耳蓋弓滿之際精神已竭手足己虛若卒然而發則矢直不直中不中皆非由我心使之也必加審之使精神和易手足安固然後發矢其不直不中為何一射法中審字與大學慮而後能得慮字同君子於至善既知所止而定而靜而安矣又必能慮焉而後能得所止君子於射箭引滿之餘發矢之際又必加審焉而後中的可決欲知審字工夫合於慮字工夫玩味之乃得一大指壓中指把弓此至妙之古法也決不可不從之一馬弓決要開至九分滿記之記之若七八分亦難中也一馬上射把箭須以箭二枝連弓弝把定又以一枝中弦挂為便其有以箭插衣領內或插腰間俱不便決要從吾言一凡箭去寧髙而過的慎勿低而不及也此人人之病記之記之一場中射須要業業恐不中決不可有一毫自放之意都如無監射各官在上都如平日自射一般慢慢一枝知鏃過一枝一枝審過一枝如何不中一凡中的之前可取必者皆自從容間暇中能必之未有忙忽而可取必者忙忽而有中者亦幸耳一凡射至五矢之外猶未中的更要從容審決不可因不中而自忙若忙則六七八九矢更無中理也一教騎射箭法曰勢如追風目如流電滿開弓急放箭目勿瞬視身勿倨坐出弓如懷中吐月平箭如弦上懸衡一步射箭法曰箭者殺人於百步之外者也射者必量其弓弓量其力無動容作色和其肢體調其氣息一其心志故曰莫患弓軟服當自逺莫患力贏引之自伾但力勝其弓必先持滿射之先近而逺此不易之法也大端還要學扯滿射逺及到然後自近求凖非如一人自未開弓便止射三二十步起也如此一為所局豈能逺耶凡射或對賊對把站定觀把子或賊人不許看扣目梢瞬則不及避而制於人此眼法也凡射前腿似橛後腿似瘸隨箭改移只在後腳左眉尖直對右腳尖丁字不成八字不就射右改左射左改右二句正中的之妙此足法也凡射前手如推泰山後手如握虎尾一拳主定前後直正慢開弓緊放箭射大存於小射小加於大存壓其前手加舉其前手務取水平前手撇後手絶一句射之玄機一撇一絶正相應之妙一齊著力使兩臂膊伸合則箭疾而加於尋常數等矣此手法也凡射頤惡旁引頭惡却垂胸惡前凸背惡後偃乃身之病此身法也凡射法箭搖頭乃是右手大食指扣弦太緊之故其扣弦太緊之故是無名小指鬆開之故學射者有此病射時用小草梢一寸用無名指小指共拾於手心箭去而草不墜即箭不搖擺矣凡對敵射箭只是箇膽大力定勢險節短則無不中人無人能避矣此狀形容不出大端將弓扯起且勿盡滿且勿輕發只是四平架手立定則勢自險矣必待將近數十步約我一發必能中敵必能殺人至死或患將切身或為賊先鋒一中而收利十倍則節自短矣馬上之賊只當看大的射不可射人諺云射人先射馬擒賊必擒頭是也凡馬須要平日適飼養時調度蹤蹲聽令進止觸物不驚馳道不削前兩腳從耳下齊出後兩腳向前倍之則疾且穩而人可用器矣故馬者人之命塞馬慣戰數倍中國居常調度之功也紀效新書卷十三
